name: Fiyat Güncelleyici
on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir çalışır
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu kopyala
        uses: actions/checkout@v2
      - name: Python Kur
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Kütüphaneleri Kur
        run: pip install requests
      - name: Botu Çalıştır
        run: python bot.py
      - name: Sonucu Kaydet ve Pushla
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "Fiyat Güncellendi" || exit 0
          git push
