<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Full İhale Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: rgba(10, 10, 10, 0.98); border: 1px solid #333; padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        .header-box { text-align: center; border-bottom: 2px solid var(--neon-blue); padding-bottom: 20px; margin-bottom: 20px; }
        h2 { color: var(--neon-blue); letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: #111; padding: 15px; border-left: 3px solid var(--neon-pink); text-align: center; }
        .stat-label { font-size: 0.7em; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .stat-num { display: block; font-family: 'Share Tech Mono'; font-size: 1.8em; color: var(--neon-pink); }

        .table-wrapper { overflow-x: auto; max-height: 700px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; font-size: 0.85em; }
        th { position: sticky; top: 0; background: #1a1a1a; color: var(--neon-blue); padding: 15px; text-align: left; border-bottom: 2px solid var(--neon-blue); z-index: 10; }
        td { padding: 12px 15px; border-bottom: 1px solid #222; }
        tr:hover { background: #151515; }
        
        .q-tag { padding: 2px 8px; border-radius: 3px; font-weight: bold; }
        .high { color: #00ff88; }
        .mid { color: #ffcc00; }
        .low { color: #ff4444; }
        .date-col { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>SAB FULL DATA MINING</h2>
        <div style="font-size: 0.8em; color: #555; margin-top: 5px;">TÜM GEÇMİŞ İHALELER VE KALİTE OLASILIKLARI</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-label">Toplam İhale Girişi</span><span class="stat-num">208</span></div>
        <div class="stat-item"><span class="stat-label">Aktif Ürün Sayısı</span><span class="stat-num" id="u-count">0</span></div>
        <div class="stat-item"><span class="stat-label">Sistem Durumu</span><span class="stat-num" style="color:var(--neon-blue)">SENKRONİZE</span></div>
    </div>

    <div class="table-wrapper">

                    <th>Q0+ OLASILIĞI</th>

            <tbody id="data-table"></tbody>

    </div>
    
    <div style="margin-top: 30px; text-align: center; color: #333; letter-spacing: 15px; font-weight: 900; font-size: 1.5em;">MADE IN: SAB</div>
</div>

    const tableBody = document.getElementById('data-table');
    const uCountElem = document.getElementById('u-count');

    function renderTable() {
        // İsme göre sırala
        const sorted = fullData.sort((a,b) => a.ad.localeCompare(b.ad));
        
        sorted.forEach(item => {
            const prob = ((item.qp / item.c) * 100).toFixed(1);
            let probClass = "mid";
            if (prob >= 80) probClass = "high";
            if (prob <= 30) probClass = "low";

            const row = `<tr>
                <td><b>${item.ad}</b></td>
                <td>${item.c}</td>
                <td><span class="q-tag ${probClass}">%${prob}</span></td>
                <td class="date-col">${item.l}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
        uCountElem.innerText = fullData.length;
    }

    renderTable();
</script>

</html>
