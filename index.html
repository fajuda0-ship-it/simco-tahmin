<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimCo İnşaat Hesaplayıcı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .section-title { font-weight: bold; margin-top: 20px; color: #34495e; border-left: 4px solid #3498db; padding-left: 10px; }
        
        label { display: block; margin-top: 10px; font-size: 14px; color: #7f8c8d; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        .price-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        
        .result-box { margin-top: 25px; padding: 15px; background: #ebf5fb; border-radius: 10px; border: 1px solid #d6eaf8; }
        .res-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #d4e6f1; font-size: 15px; }
        .res-row:last-of-type { border-bottom: none; }
        .total-price { font-size: 20px; font-weight: bold; color: #e74c3c; text-align: center; margin-top: 15px; padding-top: 10px; border-top: 2px solid #3498db; }
        
        .footer-note { font-size: 11px; color: #95a5a6; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏗️ Bina Planlayıcı</h2>

    <div class="section-title">Bina Bilgileri</div>
    <label>Bina Seç:</label>
    <select id="binaSec" onchange="hesapla()">
        <option value="bakkal">Bakkal (Grocery Store)</option>
        <option value="fabrika">Fabrika (Factory)</option>
    </select>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Mevcut Seviye:</label>
            <input type="number" id="mevcutLvl" value="1" min="1" oninput="hesapla()">
        </div>
        <div style="flex: 1;">
            <label>Hedef Seviye:</label>
            <input type="number" id="hedefLvl" value="2" min="2" oninput="hesapla()">
        </div>
    </div>

    <div class="section-title">Birim Fiyatlar ($)</div>
    <div class="price-inputs">
        <div>
            <label>Betonarme (101):</label>
            <input type="number" id="p_beton" value="216" step="0.1" oninput="hesapla()">
        </div>
        <div>
            <label>Tuğla (10):</label>
            <input type="number" id="p_tugla" value="2.50" step="0.01" oninput="hesapla()">
        </div>
        <div>
            <label>Kereste (12):</label>
            <input type="number" id="p_kereste" value="10.50" step="0.1" oninput="hesapla()">
        </div>
        <div>
            <label>İnş. Gereci (74):</label>
            <input type="number" id="p_arac" value="2400" step="1" oninput="hesapla()">
        </div>
    </div>

    <div class="result-box">
        <div id="miktarListesi">
            </div>
        <div class="total-price" id="toplamButce">
            Toplam: $0
        </div>
    </div>

    <div class="footer-note">
        Formül: Gerekli Malzeme = Mevcut Seviye × Temel Birim
    </div>
</div>

<script>
    // Temel Birimler (Lvl 1 -> 2 geçişi için gereken sabit miktarlar)
    const binalar = {
        bakkal: { beton: 12, tugla: 165, kereste: 48, arac: 3 },
        fabrika: { beton: 56, tugla: 770, kereste: 224, arac: 14 }
    };

    function hesapla() {
        const binaTuru = document.getElementById('binaSec').value;
        const mevcut = parseInt(document.getElementById('mevcutLvl').value) || 0;
        const hedef = parseInt(document.getElementById('hedefLvl').value) || 0;

        // Kullanıcının girdiği birim fiyatlar
        const fiyatBeton = parseFloat(document.getElementById('p_beton').value) || 0;
        const fiyatTugla = parseFloat(document.getElementById('p_tugla').value) || 0;
        const fiyatKereste = parseFloat(document.getElementById('p_kereste').value) || 0;
        const fiyatArac = parseFloat(document.getElementById('p_arac').value) || 0;

        const temel = binalar[binaTuru];
        
        let toplamBeton = 0;
        let toplamTugla = 0;
        let toplamKereste = 0;
        let toplamArac = 0;

        // Seviyeleri döngüyle toplayarak kümülatif maliyet bulma
        // Örn: 1'den 3'e çıkarken: (1 * Temel) + (2 * Temel)
        if (hedef > mevcut) {
            for (let i = mevcut; i < hedef; i++) {
                toplamBeton += i * temel.beton;
                toplamTugla += i * temel.tugla;
                toplamKereste += i * temel.kereste;
                toplamArac += i * temel.arac;
            }
        }

        const toplamMaliyet = (toplamBeton * fiyatBeton) + (toplamTugla * fiyatTugla) + 
                             (toplamKereste * fiyatKereste) + (toplamArac * fiyatArac);

        // Sonuçları ekrana bas
        document.getElementById('miktarListesi').innerHTML = `
            <div class="res-row"><span>Betonarme Blok:</span> <b>${toplamBeton.toLocaleString()} ad.</b></div>
            <div class="res-row"><span>Tuğla:</span> <b>${toplamTugla.toLocaleString()} ad.</b></div>
            <div class="res-row"><span>Kereste:</span> <b>${toplamKereste.toLocaleString()} ad.</b></div>
            <div class="res-row"><span>İnşaat Gereci:</span> <b>${toplamArac.toLocaleString()} ad.</b></div>
        `;

        document.getElementById('toplamButce').innerText = `Toplam: $${toplamMaliyet.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    }

    // Sayfa yüklendiğinde ilk hesabı yap
    hesapla();
</script>

</body>
</html>
