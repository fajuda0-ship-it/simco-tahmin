<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Proje Paketi Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sol Menü: Proje İsimleri */
        .sidebar { width: 350px; background: #0a0a0a; border-right: 1px solid #333; overflow-y: auto; padding: 20px; }
        .sidebar h3 { color: var(--neon-blue); font-size: 0.9em; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .project-item { 
            padding: 12px; margin-bottom: 5px; cursor: pointer; border-left: 3px solid transparent; 
            transition: 0.3s; font-size: 0.9em; color: #aaa; background: #111;
        }
        .project-item:hover { background: #1a1a1a; color: #fff; border-left-color: var(--neon-blue); }
        .project-item.active { background: #1a1a1a; color: var(--neon-blue); border-left-color: var(--neon-pink); box-shadow: inset 5px 0 10px rgba(255,0,255,0.1); }

        /* Sağ Panel: Ürün Havuzu */
        .main-panel { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111, #050505); }
        .pool-header { margin-bottom: 30px; border-bottom: 2px solid var(--neon-pink); padding-bottom: 15px; }
        .pool-title { font-size: 2em; color: var(--neon-pink); text-transform: uppercase; margin: 0; }
        .pool-stats { font-family: 'Share Tech Mono'; color: #888; font-size: 0.9em; margin-top: 10px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 20px; text-align: center; border-radius: 4px; }
        .product-name { display: block; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; color: var(--neon-blue); }
        .product-q { font-family: 'Share Tech Mono'; font-size: 0.8em; color: #ffcc00; background: rgba(255,204,0,0.1); padding: 3px 8px; border-radius: 10px; }

        .empty-state { height: 80%; display: flex; align-items: center; justify-content: center; color: #333; font-size: 1.5em; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="sidebar" id="project-list">
    <h3>İhale Senaryoları (Paketler)</h3>
    </div>

<div class="main-panel" id="detail-panel">
    <div class="empty-state">Analiz için bir paket seçin</div>
</div>

<script>
    // Attığın verilerden çıkarılan "Senaryo Bazlı" havuz yapısı
    const scenarios = {
        "İleri Robotik": { count: 5, items: ["Robotlar Q2", "Elektronik bileşenler Q3", "Yüksek seviye e-bilgisayar Q2"], last: "7 Oca 2026" },
        "Ezilme Testleri": { count: 3, items: ["Ekonomik elektrikli araba Q1", "Oto karoseri Q2", "Temel iç kısım Q2", "Ekonomik araba Q1"], last: "4 Mar 2026" },
        "E-öğrenme Cihazları": { count: 4, items: ["Tabletler Q3", "Dizüstü Q0", "Ekranlar Q3"], last: "18 Şub 2026" },
        "Veri Merkezi": { count: 3, items: ["Yerleşik bilgisayar Q0", "İşlemci Q2"], last: "31 Ara 2025" },
        "Güvenlik Ekipmanı": { count: 2, items: ["Deri Q1", "Eldiven Q1"], last: "11 Mar 2026" },
        "Yıldız Gemisi Geliştirme": { count: 5, items: ["Yıldız gemisi Q3", "Roket Yakıtı Q3"], last: "28 Oca 2026" },
        "Nükleer Santral": { count: 2, items: ["Çelik Q2", "Betonarme Blok Q1", "Kimyasal Q1", "Enerji araştırması Q0"], last: "21 Oca 2026" },
        "Mars Gezgini": { count: 4, items: ["Pil Q3", "Havacılık araştırması Q0", "Robotlar Q3"], last: "19 Kas 2025" },
        "Zirve ikramları": { count: 2, items: ["Tereyağı Q2", "Samosa Q0", "Salata Q2", "Ekmek Q0"], last: "11 Şub 2026" },
        "Drone flosu": { count: 3, items: ["Quadcopter Q1", "Uçuş bilgisayarı Q2", "Elektronik bileşenler Q3", "Pil Q2"], last: "11 Şub 2026" },
        "Moda Festivali": { count: 2, items: ["Kumaş Q2", "Moda araştırması Q0"], last: "1 Eki 2025" },
        "Şehir Festivali": { count: 2, items: ["El Çantası Q3", "Cadı kostümü Q2", "Topuklu Ayakkabı Q2"], last: "4 Şub 2026" }
    };

    const projectList = document.getElementById('project-list');
    const detailPanel = document.getElementById('detail-panel');

    function init() {
        Object.keys(scenarios).sort().forEach(name => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerText = name;
            div.onclick = () => showDetail(name, div);
            projectList.appendChild(div);
        });
    }

    function showDetail(name, element) {
        // Aktif sınıfını yönet
        document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        const data = scenarios[name];
        let itemsHtml = data.items.map(item => `
            <div class="product-card">
                <span class="product-name">${item.split(' ')[0]}</span>
                <span class="product-q">${item.split(' ')[1] || 'Q0'}</span>
            </div>
        `).join('');

        detailPanel.innerHTML = `
            <div class="pool-header">
                <h1 class="pool-title">${name}</h1>
                <div class="pool-stats">
                    TOPLAM GÖRÜLME: ${data.count} KEZ | SON TARİH: ${data.last}
                </div>
            </div>
            <div class="product-grid">
                ${itemsHtml}
            </div>
            <div style="margin-top:50px; color:#333; font-size:0.8em; font-family:'Share Tech Mono'">
                SAB STRATEGY ALGORITHM V11.0 // SİSTEM ÇALIŞIYOR
            </div>
        `;
    }

    init();
</script>

</body>
</html>
