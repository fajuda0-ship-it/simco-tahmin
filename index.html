// --- MANTIK KATMANI ---
function getAnalyzedProducts() {
    const products = {};
    tenderData.forEach(tender => {
        tender.items.forEach(item => {
            if (!products[item]) {
                products[item] = { name: item, projects: [] };
            }
            products[item].projects.push(tender);
        });
    });
    return Object.values(products).sort((a, b) => a.name.localeCompare(b.name));
}

const allProducts = getAnalyzedProducts();

function renderProductList(filter = "") {
    const listDiv = document.getElementById('productList');
    listDiv.innerHTML = "";
    
    allProducts.forEach(prod => {
        if (!prod.name.toLowerCase().includes(filter.toLowerCase())) return;
        
        const div = document.createElement('div');
        div.className = 'product-item';
        div.innerHTML = `<span>${prod.name}</span> <span style="font-size:0.7rem;">(${prod.projects.length} PROJE)</span>`;
        div.onclick = () => selectProduct(prod, div);
        listDiv.appendChild(div);
    });
}

function selectProduct(prod, element) {
    // UI Güncelleme
    document.querySelectorAll('.product-item').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
    document.getElementById('noSelection').style.display = 'none';
    
    const container = document.getElementById('detailContainer');
    container.innerHTML = `<h3 style="color:var(--warn); margin-bottom:20px;">> ANALİZ: ${prod.name}</h3>`;
    
    // Projeleri gecikme sırasına göre sırala
    const sortedProjects = [...prod.projects].sort((a, b) => {
        const diffA = (SYSTEM_DATE - new Date(a.lastSeen)) / (1000*60*60*24);
        const diffB = (SYSTEM_DATE - new Date(b.lastSeen)) / (1000*60*60*24);
        return (b.cycle - diffB) - (a.cycle - diffA);
    });

    sortedProjects.forEach(p => {
        const last = new Date(p.lastSeen);
        const passed = Math.ceil((SYSTEM_DATE - last) / (1000*60*60*24));
        const rem = p.cycle - passed;
        
        let statusClass = "tag-ok";
        let statusText = `${rem} GÜN VAR`;
        
        if (rem <= 0) {
            statusClass = "tag-crit";
            statusText = `GECİKTİ (+${Math.abs(rem)} G)`;
        } else if (rem <= 3) {
            statusClass = "tag-warn";
            statusText = "ELI KULAĞINDA";
        }

        container.innerHTML += `
            <div class="project-card">
                <span class="tag ${statusClass}">${statusText}</span>
                <div style="font-weight:bold; font-size:1.1rem; color:var(--neon);">${p.name}</div>
                <div style="margin-top:5px;">Döngü: ${p.cycle} Gün | Son Görülme: ${p.lastSeen}</div>
                <div class="resource-list">GEREKSİNİMLER: ${p.items.join(", ")}</div>
            </div>
        `;
    });
}

// Arama kutusu kontrolü
document.getElementById('productSearch').addEventListener('input', (e) => {
    renderProductList(e.target.value);
});
