<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Strateji Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #007bff; --bg: #0d1117; --sidebar-bg: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        .header { background: var(--sidebar-bg); padding: 12px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: 'Roboto Mono'; font-size: 0.9em; }
        
        .container { display: flex; flex: 1; overflow: hidden; }

        /* Sol Liste */
        .sidebar { width: 450px; background: var(--sidebar-bg); border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; }
        .list-header { display: grid; grid-template-columns: 1fr 60px 100px; font-size: 0.7em; color: #8b949e; padding: 0 15px 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; text-transform: uppercase; }
        
        .item { 
            padding: 12px 15px; margin-bottom: 4px; cursor: pointer; border-radius: 6px;
            display: grid; grid-template-columns: 1fr 60px 100px; align-items: center; transition: 0.2s; font-size: 0.85em;
        }
        .item:hover { background: #21262d; }
        .item.active { background: #1f6feb; color: white; }
        
        .freq { font-family: 'Roboto Mono'; font-weight: bold; text-align: center; color: #58a6ff; }
        .item.active .freq { color: white; }
        .days { font-family: 'Roboto Mono'; text-align: right; font-size: 0.9em; }

        /* Sağ Panel */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .detail-header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .detail-header h1 { margin: 0; font-size: 1.8em; color: #f0f6fc; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        .card-name { display: block; font-weight: bold; margin-bottom: 5px; color: #58a6ff; }
        .card-q { font-family: 'Roboto Mono'; font-size: 0.75em; color: #8b949e; }

        /* Ticker */
        .ticker { background: #010409; height: 35px; border-top: 1px solid var(--border); overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
        .ticker-inner { display: inline-block; padding-left: 100%; animation: scroll 30s linear infinite; }
        .ticker-span { margin-right: 50px; font-family: 'Roboto Mono'; font-size: 0.8em; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="header">
    <div>ANALİZ TERMİNALİ / FREKANS SIRALAMASI</div>
    <div style="color:#8b949e">BUGÜN: 13 MART 2026</div>
</div>

<div class="container">
    <div class="sidebar">
        <div class="list-header"><span>Senaryo</span><span>Geliş</span><span>Gecikme</span></div>
        <div id="target"></div>
    </div>
    <div class="main" id="view">
        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#484f58; font-size:1.2em;">BİR PAKET SEÇİN</div>
    </div>
</div>

<div class="ticker"><div class="ticker-inner" id="tick"></div></div>

<script>
    const now = new Date("2026-03-13");
    const data = {
        "İleri Robotik": { c: 15, d: "2026-03-04", i: ["Robotlar Q0", "Elektronik bileşenler Q0", "Yüksek seviye e-bilgisayar Q2"] },
        "Hava Kalitesi İzleme": { c: 12, d: "2025-12-10", i: ["Kimyasal Q3", "Akıllı Telefonlar Q1", "Ekranlar Q0"] },
        "Mars Gezgini": { c: 11, d: "2025-11-19", i: ["Pil Q3", "Havacılık araştırması Q0", "Robotlar Q3"] },
        "Sürdürülebilir Tarım": { c: 9, d: "2026-01-21", i: ["Su Q3", "Tahıl Q0"] },
        "E-öğrenme Cihazları": { c: 9, d: "2026-02-18", i: ["Tabletler Q3", "Dizüstü Q0", "Ekranlar Q3"] },
        "Ezilme Testleri": { c: 8, d: "2026-03-04", i: ["Araba Karoseri Q2", "Ekonomik Araba Q1", "İç Kısım Q2"] },
        "Yıldız Gemisi": { c: 8, d: "2026-01-28", i: ["Yıldız Gemisi Q3", "Roket Yakıtı Q3"] },
        "Veri Merkezi": { c: 8, d: "2025-12-31", i: ["Yerleşik Bilgisayar Q0", "İşlemci Q2"] },
        "Akıllı Yollar": { c: 7, d: "2026-03-04", i: ["Monitör Q0", "Akıllı Telefon Q0", "Ekran Q0"] },
        "Yakıt Rezervleri": { c: 7, d: "2025-11-12", i: ["Metan Q2", "Etanol Q3", "Petrol Q0"] },
        "Güvenlik Ekipmanı": { c: 6, d: "2026-03-11", i: ["Deri Q1", "Eldiven Q1"] },
        "Navigasyon": { c: 5, d: "2026-03-11", i: ["Roket Yakıtı Q3", "Uydu Q3"] },
        "Çevreci Binalar": { c: 5, d: "2026-02-18", i: ["Çelik Kiriş Q2", "Pencere Q1"] },
        "Nükleer Santral": { c: 4, d: "2026-01-21", i: ["Çelik Q2", "Beton Q1", "Kimyasal Q1"] },
        "Tahliye Araçları": { c: 2, d: "2025-11-05", i: ["Taşıma Q0", "Kamyon Q0", "Dizel Q3"] }
    };

    function getDays(s) {
        return Math.floor((now - new Date(s)) / 86400000);
    }

    const sorted = Object.keys(data).sort((a,b) => data[b].c - data[a].c);
    const target = document.getElementById('target');
    const tick = document.getElementById('tick');

    sorted.forEach(name => {
        const days = getDays(data[name].d);
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `<span>${name}</span><span class="freq">${data[name].c}x</span><span class="days">${days} GÜN</span>`;
        el.onclick = () => {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            render(name, days);
        };
        target.appendChild(el);
        tick.innerHTML += `<span class="ticker-span">${name.toUpperCase()}: ${days} GÜN ÖNCE</span>`;
    });

    function render(name, days) {
        const info = data[name];
        document.getElementById('view').innerHTML = `
            <div class="detail-header">
                <h1>${name}</h1>
                <p style="color:#8b949e">Toplam ${info.c} kez geldi. En son ${days} gün önce görüldü.</p>
            </div>
            <div class="grid">${info.i.map(x => `<div class="card"><span class="card-name">${x.split(' Q')[0]}</span><span class="card-q">Kriter: Q${x.split(' Q')[1]}</span></div>`).join('')}</div>
        `;
    }
</script>
</body>
</html>
