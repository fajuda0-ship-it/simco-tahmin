<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Full Senaryo Bankası</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 380px; background: #0a0a0a; border-right: 1px solid #333; overflow-y: auto; padding: 20px; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        .sidebar h3 { color: var(--neon-blue); font-size: 0.9em; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        
        .project-item { 
            padding: 10px 15px; margin-bottom: 6px; cursor: pointer; border-left: 3px solid #222; 
            transition: 0.2s; font-size: 0.85em; color: #888; background: #111; display: flex; justify-content: space-between;
        }
        .project-item:hover { background: #1a1a1a; color: #fff; border-left-color: var(--neon-blue); }
        .project-item.active { background: #1a1a1a; color: var(--neon-blue); border-left-color: var(--neon-pink); }
        .count-badge { font-family: 'Share Tech Mono'; font-size: 0.8em; color: #555; }

        .main-panel { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f0f0f, #050505); }
        .pool-header { margin-bottom: 30px; border-bottom: 2px solid var(--neon-pink); padding-bottom: 15px; }
        .pool-title { font-size: 2.2em; color: var(--neon-pink); text-transform: uppercase; margin: 0; text-shadow: 0 0 10px rgba(255,0,255,0.3); }
        .pool-stats { font-family: 'Share Tech Mono'; color: #888; font-size: 0.9em; margin-top: 10px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .product-card { background: #151515; border: 1px solid #222; padding: 15px; border-radius: 4px; border-top: 2px solid var(--neon-blue); }
        .product-name { display: block; font-weight: bold; font-size: 1em; color: #fff; margin-bottom: 8px; }
        .product-q { font-family: 'Share Tech Mono'; font-size: 0.8em; color: var(--neon-blue); }

        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #222; font-size: 1.2em; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar" id="project-list">
    <h3>Tüm İhale Senaryoları</h3>
    <div id="items-container"></div>
</div>

<div class="main-panel" id="detail-panel">
    <div class="empty-state">
        <div style="font-size: 4em; margin-bottom: 20px;">SAB</div>
        LİSTEDEN BİR SENARYO SEÇEREK HAVUZU ANALİZ EDİN
    </div>
</div>

<script>
    const scenarios = {

        "Ezilme Testleri": { items: ["Ekonomik elektrikli araba Q1", "Oto karoseri Q2", "Temel iç kısım Q2", "Ekonomik araba Q1"], last: "4 Mar 2026", c: 6 },

        "Çevreci Binalar": { items: ["Çelik Kiriş Q2", "Pencere Q1"], last: "18 Şub 2026", c: 4 },

        "Protein Reserves": { items: ["Yumurta Q2", "Biftek Q0"], last: "11 Şub 2026", c: 2 },

        "Uzay Keşfi": { items: ["Karbon fiber Q0", "BFR Q1", "Yörüngesel güçlendirici Q3"], last: "7 Oca 2026", c: 5 },
        "Veri Merkezi": { items: ["Yerleşik bilgisayar Q0", "İşlemci Q2"], last: "31 Ara 2025", c: 6 },
        "Drone programı": { items: ["Kanat Q3", "Uçak gövdesi Q3", "Uçuş bilgisayarı Q0"], last: "24 Ara 2024", c: 2 },

        "Metro Altyapısı Genişlemesi": { items: ["Betonarme Blok Q2", "İnşaat Gereci Q0", "Çelik Kiriş Q0"], last: "26 Kas 2025", c: 3 },
        "Etçil Hayvan Beslenmesi": { items: ["İnek Q0", "Domuz Q1"], last: "26 Kas 2025", c: 5 },

        "Mars Gezgini": { items: ["Pil Q3", "Havacılık araştırması Q0", "Robotlar Q3"], last: "19 Kas 2025", c: 6 },
        "Otçul Hayvan Beslenmesi": { items: ["Sebze Q0", "Yem Q3", "Şekerkamışı Q2", "Portakal Q2", "Elmalar Q0"], last: "12 Kas 2025", c: 1 },
        "Ekonomik Destek": { items: ["Yazılım Q0", "Tabletler Q2"], last: "12 Kas 2025", c: 2 },
        "Yakıt Rezervleri": { items: ["Metan Q2", "Etanol Q3", "Petrol Q0"], last: "12 Kas 2025", c: 5 },
        "Tahliye Araçları": { items: ["Taşıma Q0", "Kamyon Q0", "Dizel Q3"], last: "5 Kas 2025", c: 3 },
        "Dijital Ödeme Sistemi": { items: ["Yazılım Q0", "Elektronik bileşenler Q2"], last: "29 Eki 2025", c: 4 },
        "Araştırma fonları": { items: ["Kimya araştırması Q0", "Madencilik araştırması Q0", "Malzeme araştırması Q0"], last: "22 Eki 2025", c: 2 },
        "Sanat Müzesi": { items: ["İnşaat Gereci Q0", "Çelik Kiriş Q0", "Cam Q3"], last: "22 Eki 2025", c: 3 },
        "Dijital Altyapı": { items: ["Yazılım Q0", "İşlemci Q3"], last: "8 Eki 2025", c: 2 },
        "Okul Öğle Yemeği Programı": { items: ["Portakal Q0", "Süt Q3", "Elmalar Q2"], last: "1 Eki 2025", c: 6 },
        "Moda Festivali": { items: ["Kumaş Q2", "Moda araştırması Q0"], last: "1 Eki 2025", c: 4 },
        "BM Zirvesi İkramları": { items: ["Ekmek Q1", "Kahve çekirdeği Q2", "Kahve tozu Q2", "Çikolata Q3"], last: "24 Eyl 2025", c: 3 }
    };

    const container = document.getElementById('items-container');
    const detailPanel = document.getElementById('detail-panel');

    function init() {
        Object.keys(scenarios).sort().forEach(name => {
            const data = scenarios[name];
            const div = document.createElement('div');
            div.className = 'project-item';
            div.innerHTML = `<span>${name}</span><span class="count-badge">${data.c}x</span>`;
            div.onclick = () => showDetail(name, div);
            container.appendChild(div);
        });
    }

    function showDetail(name, element) {
        document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        const data = scenarios[name];
        let itemsHtml = data.items.map(item => {
            const parts = item.split(' ');
            const q = parts.pop();
            const n = parts.join(' ');
            return `
                <div class="product-card">
                    <span class="product-name">${n}</span>
                    <span class="product-q">KALİTE HEDEFİ: ${q}</span>
                </div>
            `;
        }).join('');

        detailPanel.innerHTML = `
            <div class="pool-header">
                <h1 class="pool-title">${name}</h1>
                <div class="pool-stats">
                    VERİLEN İHALE SAYISI: ${data.c} | SON GÖRÜLME: ${data.last}
                </div>
            </div>
            <div class="product-grid">
                ${itemsHtml}
            </div>
        `;
    }

    init();
</script>

</body>
</html>
