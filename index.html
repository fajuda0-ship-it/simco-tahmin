<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB CORE TERMINAL v26.0 // PREDICTION ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2f81f7; --bg: #0d1117; --sidebar-bg: #161b22; --border: #30363d; --text: #c9d1d9; --up: #3fb950; --down: #f85149; --warning: #d29922; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--sidebar-bg); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: 'Roboto Mono'; font-size: 0.85em; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 8px; }
        .nav-btn { padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: #21262d; color: var(--text); cursor: pointer; text-align: left; font-size: 0.85em; font-family: 'Roboto Mono'; transition: 0.2s; }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .stat-card { background: #161b22; border: 1px solid var(--border); padding: 15px; border-radius: 8px; position: relative; }
        .prob-badge { position: absolute; top: 15px; right: 15px; padding: 4px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }
        .high-prob { background: rgba(63, 185, 80, 0.2); color: var(--up); border: 1px solid var(--up); }
        .low-prob { background: rgba(248, 81, 73, 0.2); color: var(--down); border: 1px solid var(--down); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: 'Roboto Mono'; font-size: 0.85em; }
        th { text-align: left; padding: 12px; color: #8b949e; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #21262d; }
        .tag { font-size: 0.75em; padding: 2px 6px; border-radius: 3px; background: #30363d; margin-right: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: var(--accent);">[SAB] TAHMİN MOTORU v26.0</div>
    <div id="date-now">16 MART 2026</div>
</div>

<div class="container">
    <div class="sidebar">
        <button class="nav-btn active" onclick="showTab('predict')">İHALE TAHMİNLERİ</button>
        <button class="nav-btn" onclick="showTab('history')">HAVUZ GEÇMİŞİ</button>
        <div style="margin-top: auto; font-size: 0.7em; color: #8b949e; border-top: 1px solid var(--border); padding-top: 10px;">
            VERİ KAYNAĞI: 200+ İHALE LOGU<br>ALGORİTMA: PERİYOT ANALİZİ
        </div>
    </div>
    
    <div class="main-content" id="content">
        </div>
</div>

<script>
    const TODAY = new Date("2026-03-16");

    // ANA VERİ TABANI (Senin listenden çıkarılan periyotlar)
    const projects = [
        { ad: "İleri Robotik", cat: "Elektronik", last: "2026-03-04", period: 18, items: "Robotlar, E-Bileşenler" },
        { ad: "E-öğrenme Cihazları", cat: "Elektronik", last: "2026-02-18", period: 21, items: "Tablet, Dizüstü, Ekran" },
        { ad: "Yıldız Gemisi Geliştirme", cat: "Uzay", last: "2026-01-28", period: 40, items: "Yıldız Gemisi, R. Yakıtı" },
        { ad: "Değerli Metaller", cat: "Hammadde", last: "2026-03-12", period: 28, items: "Altın, Cevher" },
        { ad: "Ezilme Testleri", cat: "Ağır Sanayi", last: "2026-03-04", period: 21, items: "E. Araba, Karoseri" },
        { ad: "Nükleer Santral", cat: "Ağır Sanayi", last: "2026-01-21", period: 35, items: "Çelik, Beton, Kimyasal" },
        { ad: "Navigasyon Takımyıldızı", cat: "Uzay", last: "2026-03-11", period: 28, items: "Uydu, R. Yakıtı" },
        { ad: "Evsizleri Besleyin", cat: "Gıda", last: "2026-03-11", period: 21, items: "Çorba, Pizza" }
    ];

    function calculatePrediction() {
        return projects.map(p => {
            const lastDate = new Date(p.last);
            const diffDays = Math.floor((TODAY - lastDate) / (1000 * 60 * 60 * 24));
            
            // Tahmin formülü: (Geçen gün / Periyot) * 100
            let prob = Math.round((diffDays / p.period) * 100);
            if (prob > 99) prob = 99; // %100 asla deme (AI kuralı)

            return { ...p, diffDays, prob };
        }).sort((a, b) => b.prob - a.prob);
    }

    function showTab(tab) {
        const view = document.getElementById('content');
        const data = calculatePrediction();

        if(tab === 'predict') {
            let cards = data.slice(0, 3).map(p => `
                <div class="stat-card">
                    <div class="prob-badge ${p.prob > 80 ? 'high-prob' : ''}">${p.prob}% İHTİMAL</div>
                    <div style="font-size:0.75em; color:#8b949e">${p.cat.toUpperCase()}</div>
                    <div style="font-size:1.2em; font-weight:bold; margin: 10px 0;">${p.ad}</div>
                    <div style="font-size:0.8em; color:var(--accent)">${p.items}</div>
                    <div style="margin-top:15px; font-size:0.75em; color:#555">SON GELİŞ: ${p.diffDays} GÜN ÖNCE</div>
                </div>
            `).join('');

            view.innerHTML = `
                <h2 style="margin-top:0">18 Mart Çarşamba Tahminleri</h2>
                <div class="grid">${cards}</div>
                <h3>Tüm Havuz Durumu</h3>
                <table>
                    <tr><th>PROJE</th><th>KATEGORİ</th><th>DÖNGÜ</th><th>DURUM</th><th>GELME ŞANSI</th></tr>
                    ${data.map(p => `
                        <tr>
                            <td><b>${p.ad}</b></td>
                            <td><span class="tag">${p.cat}</span></td>
                            <td>${p.period} Gün</td>
                            <td style="color:${p.diffDays >= p.period ? 'var(--up)' : '#8b949e'}">
                                ${p.diffDays >= p.period ? 'VAKİT DOLDU' : p.diffDays + '. GÜNDE'}
                            </td>
                            <td style="font-weight:bold; color:${p.prob > 70 ? 'var(--up)' : 'var(--text)'}">%${p.prob}</td>
                        </tr>
                    `).join('')}
                </table>`;
        }
    }

    showTab('predict');
</script>

</body>
</html>
