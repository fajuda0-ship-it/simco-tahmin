<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Terminal</title>
    <style>
        body { font-family: sans-serif; background: white; color: black; padding: 20px; text-align: center; }
        .price-box { font-size: 70px; font-weight: bold; margin: 20px 0; }
        .alert { background: red; color: white; padding: 30px; font-size: 40px; display: none; }
        .normal { color: green; font-size: 20px; }
        .info { color: #666; margin-top: 50px; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

    <h1>ROBOTLAR Q0 FİYATI</h1>
    
    <div id="price-display" class="price-box">Yükleniyor...</div>
    
    <div id="alert-box" class="alert">🚨 ALARM: FİYAT 824 ÜSTÜNDE! 🚨</div>
    
    <div id="status" class="normal">Sistem kontrol ediliyor...</div>

    <div class="info">
        Baz Fiyat: 800 | Eşik: 824 | Hedef ID: 114
    </div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbweuwUcMcvFUsYdBMSvjL_FoT7fPJxBbHxG_9sUs5gYkkJjxkO1K-AIQ8-EkRTxGJer/exec";

    async function veriyiCek() {
        const priceDiv = document.getElementById('price-display');
        const alertDiv = document.getElementById('alert-box');
        const statusDiv = document.getElementById('status');

        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            
            // Senin verdiğin formata göre doğrudan filtreleme
            // Hem liste içinde hem de obje içinde arama yapar
            let liste = Array.isArray(data) ? data : (data.contents || []);
            
            const robot = liste.find(item => item.resourceId === 114 && item.quality === 0);

            if (robot) {
                const fiyat = robot.price;
                priceDiv.innerText = "$" + fiyat.toFixed(2);
                
                if (fiyat >= 824) {
                    alertDiv.style.display = "block";
                    statusDiv.style.display = "none";
                } else {
                    alertDiv.style.display = "none";
                    statusDiv.style.display = "block";
                    statusDiv.innerText = "Fiyat normal seyrediyor.";
                }
            } else {
                priceDiv.innerText = "Bulunamadı";
                statusDiv.innerText = "Veri geldi ama Robot 114 (Q0) listede yok.";
            }
        } catch (e) {
            statusDiv.innerText = "Bağlantı hatası: " + e.message;
        }
    }

    veriyiCek();
    setInterval(veriyiCek, 30000); // 30 saniyede bir güncelleme
</script>

</body>
</html>
