<div class="p-6 bg-slate-800 rounded-xl text-white max-w-lg mx-auto shadow-2xl">
    <h2 class="text-xl font-bold mb-4 border-b pb-2">Üretim & COO Hesaplayıcı</h2>
    
    <div class="space-y-4">
        <div>
            <label class="block text-sm opacity-70">COO Yönetim Becerisi (Management)</label>
            <input type="number" id="coo-skill" class="w-full p-2 bg-slate-700 rounded border border-slate-600" value="0">
        </div>
        
        <div>
            <label class="block text-sm opacity-70">Ham Yönetim Gideri (%) (Profilinizde yazan)</label>
            <input type="number" id="raw-admin" class="w-full p-2 bg-slate-700 rounded border border-slate-600" value="20">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm opacity-70">İşçilik Maliyeti ($)</label>
                <input type="number" id="labor-cost" class="w-full p-2 bg-slate-700 rounded border border-slate-600" placeholder="Örn: 15.50">
            </div>
            <div>
                <label class="block text-sm opacity-70">Ham Madde Toplam ($)</label>
                <input type="number" id="input-cost" class="w-full p-2 bg-slate-700 rounded border border-slate-600" placeholder="Örn: 1200">
            </div>
        </div>
    </div>

    <div class="mt-6 p-4 bg-slate-900 rounded-lg border-l-4 border-green-500">
        <div class="text-sm opacity-70">Gerçek Birim Maliyetiniz:</div>
        <div id="final-cost" class="text-3xl font-black text-green-400">$0.00</div>
        <div id="admin-saving" class="text-xs text-blue-400 mt-1">COO Tasarrufu: %0</div>
    </div>
</div>
