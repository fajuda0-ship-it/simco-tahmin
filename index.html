<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Dijital - HARİTA KURMA YARDIMCISI</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0b0e11; color: #ffffff; display: flex; justify-content: center; padding: 40px; }
        .card { background: #161a1e; padding: 25px; border-radius: 12px; width: 420px; border: 1px solid #2b3139; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #00d2ff; text-align: center; margin-bottom: 25px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #2b3139; padding-bottom: 15px; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #848e9c; }
        input, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #474d57; background: #1e2329; color: white; outline: none; transition: 0.2s; }
        input:focus { border-color: #00d2ff; }
        button { width: 100%; padding: 14px; background: #00d2ff; border: none; color: #0b0e11; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; font-size: 15px; }
        button:hover { background: #0099cc; }
        #results { margin-top: 25px; padding: 20px; border-radius: 8px; background: #0b0e11; display: none; border-left: 4px solid #00d2ff; }
        .res-line { margin-bottom: 10px; font-size: 15px; }
        .val { color: #00d2ff; font-weight: bold; font-size: 18px; }
        .bot-msg { font-size: 12px; margin-top: 15px; color: #f0b90b; padding-top: 10px; border-top: 1px dashed #474d57; }
    </style>
</head>
<body>

<div class="card">
    <h2>HARİTA KURMA YARDIMCISI</h2>
    
    <div class="group">
        <label>Seçili Ürün</label>
        <input type="text" value="Roket Motoru" readonly style="color: #00d2ff; font-weight: bold;">
    </div>

    <div class="group">
        <label>Günlük Hedef Miktar (Adet)</label>
        <input type="number" id="target" value="1000">
    </div>

    <div class="group">
        <label>Bina Slot Sayısı</label>
        <input type="number" id="slots" value="12">
    </div>

    <div class="group">
        <label>Üretim Hızı Bonusu (%)</label>
        <input type="number" id="bonus" value="1" step="0.5">
    </div>

    <div class="group">
        <label>Robot Atanmış mı?</label>
        <select id="robots">
            <option value="yes">Evet, Robot Var</option>
            <option value="no">Hayır, Robot Yok</option>
        </select>
    </div>

    <button onclick="hesapla()">HESAPLA</button>

    <div id="results">
        <div class="res-line">Ürün: <span class="val">Roket Motoru</span></div>
        <div class="res-line">Toplam Gereken Seviye: <span id="rTotal" class="val"></span></div>
        <div class="res-line">Bina Başı Ortalama: <span id="rPer" class="val"></span></div>
        <div id="rAdvice" class="bot-msg"></div>
    </div>
</div>

<script>
function hesapla() {
    const bazProd = 0.31; // Roket Motoru Lvl 1 Baz Üretim
    const target = parseFloat(document.getElementById('target').value);
    const slots = parseInt(document.getElementById('slots').value);
    const bonus = parseFloat(document.getElementById('bonus').value) / 100;
    const isBot = document.getElementById('robots').value === "yes";
    
    const hrTarget = target / 24;
    const realCap = bazProd * (1 + bonus);
    
    const totalLvl = hrTarget / realCap;
    const perBld = Math.ceil(totalLvl / slots);

    document.getElementById('results').style.display = "block";
    document.getElementById('rTotal').innerText = Math.ceil(totalLvl) + " Seviye";
    document.getElementById('rPer').innerText = perBld + ". Seviye (Her bina)";

    let msg = isBot 
        ? "🤖 Robotlar aktif: İşçi maliyeti düşük tutuluyor." 
        : "⚠️ Robot yok: Bina seviyeleri yükseldikçe işçi maliyeti kârı eritebilir!";
    document.getElementById('rAdvice').innerText = msg;
}
</script>

</body>
</html>
