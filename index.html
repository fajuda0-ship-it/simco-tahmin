<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB İhale Analitik Merkezi</title>
    <style>
        body { background-color: #050505; color: #00ffcc; font-family: 'Consolas', monospace; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #0a0a0a; border: 2px solid #ff00ff; border-radius: 12px; padding: 30px; box-shadow: 0 0 25px rgba(255, 0, 255, 0.15); }
        .header { text-align: center; border-bottom: 2px solid #222; margin-bottom: 25px; padding-bottom: 10px; }
        .security-badge { background: #ff00ff; color: #000; padding: 10px; font-weight: bold; text-transform: uppercase; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #ff00ff; border-bottom: 2px solid #333; font-size: 0.9em; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 1.1em; }
        
        .row-product { font-weight: bold; color: #fff; }
        .row-pct { color: #00ffcc; font-weight: bold; }
        .row-date { color: #ffcc00; font-family: 'Courier New', monospace; font-weight: bold; }
        
        .bar-container { background: #1a1a1a; height: 10px; border-radius: 5px; width: 80px; display: inline-block; margin-left: 10px; vertical-align: middle; }
        .bar-fill { background: #00ffcc; height: 100%; border-radius: 5px; }
        
        .footer { text-align: center; margin-top: 30px; color: #444; font-size: 0.8em; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="security-badge">Strateji Atılım Birliği - Gizli Veri Akışı</div>
        <h1 style="color: #fff; letter-spacing: 3px;">İHALE TRAFİK VE KRONOLOJİ ANALİZİ</h1>
    </div>

    <table>
        <thead>
            <tr>
                <th>ÜRÜN</th>
                <th>TRAFİK PAYI (%)</th>
                <th>Q1+ ORANI</th>
                <th>SON GÖRÜLDÜĞÜ TARİH (EN GÜNCEL İD)</th>
            </tr>
        </thead>
        <tbody id="tender-table">
            </tbody>
    </table>

    <div class="footer">SAB ENGINE V3.0 - SON 200+ İHALE VERİSİ İŞLENDİ</div>
</div>

<script>
    // Listendeki ID ve Tarih eşleşmesine göre hazırlanan kesin veriler
    const data = [
        {ad: "Robotlar", p: 12.4, q: 28, last: "4 Mar 2026 Çar"},
        {ad: "Elektronik Bileşenler", p: 9.1, q: 22, last: "4 Mar 2026 Çar"},
        {ad: "Çelik", p: 7.8, q: 15, last: "5 Kas 2025 Çar"},
        {ad: "Pil", p: 6.9, q: 19, last: "5 Kas 2025 Çar"},
        {ad: "Roket Yakıtı", p: 6.2, q: 10, last: "19 Mar 2025 Çar"},
        {ad: "İşlemci", p: 5.5, q: 31, last: "31 Ara 2025 Çar"},
        {ad: "Ekranlar", p: 4.8, q: 18, last: "18 Şub 2026 Çar"},
        {ad: "Yazılım", p: 4.4, q: 35, last: "12 Kas 2025 Çar"},
        {ad: "İnşaat Gereci", p: 4.1, q: 12, last: "21 Oca 2026 Çar"},
        {ad: "Tabletler", p: 3.9, q: 25, last: "18 Şub 2026 Çar"},
        {ad: "Dizüstü", p: 3.7, q: 27, last: "18 Şub 2026 Çar"},
        {ad: "Malzeme Araştırması", p: 2.1, q: 0, last: "4 Mar 2026 Çar"},
        {ad: "Akıllı Telefonlar", p: 1.9, q: 12, last: "4 Mar 2026 Çar"},
        {ad: "Monitör", p: 1.7, q: 15, last: "4 Mar 2026 Çar"},
        {ad: "Biftek", p: 1.5, q: 8, last: "4 Şub 2026 Çar"}
    ];

    const tableBody = document.getElementById('tender-table');

    data.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="row-product">${item.ad}</td>
            <td>
                <span class="row-pct">%${item.p}</span>
                <div class="bar-container"><div class="bar-fill" style="width: ${item.p * 6}%"></div></div>
            </td>
            <td>%${item.q}</td>
            <td class="row-date">${item.last}</td>
        `;
        tableBody.appendChild(row);
    });
</script>

</body>
</html>
