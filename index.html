<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Terminal V13</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Üst Bilgi Çubuğu */
        .top-bar { background: #111; padding: 10px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-family: 'Share Tech Mono'; }
        .system-date { color: var(--neon-blue); font-weight: bold; }

        /* Ana İçerik Alanı */
        .content-wrapper { display: flex; flex: 1; overflow: hidden; }

        /* Sol Menü */
        .sidebar { width: 380px; background: #0a0a0a; border-right: 1px solid #333; overflow-y: auto; padding: 20px; }
        .project-item { 
            padding: 12px 15px; margin-bottom: 6px; cursor: pointer; border-left: 3px solid #222; 
            transition: 0.2s; font-size: 0.85em; color: #888; background: #111; display: flex; justify-content: space-between;
        }
        .project-item:hover { background: #1a1a1a; color: #fff; border-left-color: var(--neon-blue); }
        .project-item.active { background: #1a1a1a; color: var(--neon-blue); border-left-color: var(--neon-pink); }
        .days-ago { font-family: 'Share Tech Mono'; font-size: 0.85em; color: #ff4444; }
        .days-ago.safe { color: #00ff88; }

        /* Sağ Panel */
        .main-panel { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f0f0f, #050505); }
        .pool-header { margin-bottom: 30px; border-bottom: 2px solid var(--neon-pink); padding-bottom: 15px; }
        .pool-title { font-size: 2.2em; color: var(--neon-pink); text-transform: uppercase; margin: 0; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .product-card { background: #151515; border: 1px solid #222; padding: 15px; border-radius: 4px; border-top: 2px solid var(--neon-blue); }
        
        /* Alt Kayan Yazı (Ticker) */
        .ticker-wrapper { background: #000; height: 40px; border-top: 1px solid var(--neon-blue); overflow: hidden; display: flex; align-items: center; }
        .ticker-content { white-space: nowrap; animation: ticker 40s linear infinite; display: flex; align-items: center; }
        .ticker-item { color: #fff; font-family: 'Share Tech Mono'; font-size: 0.9em; margin-right: 50px; display: flex; align-items: center; }
        .ticker-label { color: var(--neon-blue); margin-right: 10px; font-weight: bold; }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="letter-spacing: 3px;">SAB STRATEGY TERMINAL <span style="color:#555">v13.0</span></div>
    <div class="system-date">SİSTEM TARİHİ: 13 MART 2026</div>
</div>

<div class="content-wrapper">
    <div class="sidebar" id="project-list">
        <h3 style="color:var(--neon-blue); font-size:0.8em; letter-spacing:2px; margin-bottom:15px; text-transform:uppercase;">İhale Havuzu</h3>
        <div id="items-container"></div>
    </div>

    <div class="main-panel" id="detail-panel">
        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#222; font-size:1.5em; letter-spacing:10px;">ANALİZ İÇİN PAKET SEÇİN</div>
    </div>
</div>

<div class="ticker-wrapper">
    <div class="ticker-content" id="ticker-data">
        </div>
</div>

<script>
    const today = new Date("2026-03-13");

    const scenarios = {
        "Navigasyon Takımyıldızı": { items: ["Roket Yakıtı Q3", "Uydu Q3"], last: "2026-03-11" },
        "Evsizleri besleyin": { items: ["Bal kabağı çorbası Q2", "Dondurulmuş pizza Q2"], last: "2026-03-11" },
        "Güvenlik Ekipmanı": { items: ["Deri Q1", "Eldiven Q1"], last: "2026-03-11" },
        "Akıllı Yollar": { items: ["Monitör Q0", "Malzeme araştırması Q0", "Akıllı Telefonlar Q0", "Elektronik bileşenler Q2"], last: "2026-03-04" },
        "Ezilme Testleri": { items: ["Oto karoseri Q2", "Temel iç kısım Q2", "Ekonomik araba Q1"], last: "2026-03-04" },
        "İleri Robotik": { items: ["Elektronik bileşenler Q0", "Robotlar Q0", "Yüksek seviye e-bilgisayar Q2"], last: "2026-03-04" },
        "E-öğrenme Cihazları": { items: ["Tabletler Q3", "Dizüstü Q0", "Ekranlar Q3"], last: "2026-02-18" },
        "Zirve ikramları": { items: ["Samosa Q0", "Salata Q2", "Ekmek Q0"], last: "2026-02-11" },
        "Mars Gezgini": { items: ["Pil Q3", "Havacılık araştırması Q0", "Robotlar Q3"], last: "2025-11-19" },
        "Nükleer Santral": { items: ["Çelik Q2", "Betonarme Blok Q1", "Kimyasal Q1"], last: "2026-01-21" },
        "Veri Merkezi": { items: ["Yerleşik bilgisayar Q0", "İşlemci Q2"], last: "2025-12-31" },
        "Uzay Keşfi": { items: ["Karbon fiber Q0", "BFR Q1", "Yörüngesel güçlendirici Q3"], last: "2026-01-07" },
        "Yakıt Rezervleri": { items: ["Metan Q2", "Etanol Q3", "Petrol Q0"], last: "2025-11-12" }
    };

    function calculateDays(dateStr) {
        const lastDate = new Date(dateStr);
        const diffTime = Math.abs(today - lastDate);
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }

    function init() {
        const container = document.getElementById('items-container');
        const ticker = document.getElementById('ticker-data');
        
        // Listeyi alfabetik sırala
        const sortedNames = Object.keys(scenarios).sort();

        sortedNames.forEach(name => {
            const days = calculateDays(scenarios[name].last);
            const div = document.createElement('div');
            div.className = 'project-item';
            
            // Eğer 30 günden fazlaysa rengi daha dikkat çekici yap
            const dayClass = days > 30 ? 'days-ago' : 'days-ago safe';
            
            div.innerHTML = `<span>${name}</span><span class="${dayClass}">${days} GÜN ÖNCE</span>`;
            div.onclick = () => showDetail(name, div, days);
            container.appendChild(div);
        });

        // Kayan Yazı: Son 5 Paket (En yakın tarihliler)
        const recent = Object.keys(scenarios)
            .sort((a,b) => new Date(scenarios[b].last) - new Date(scenarios[a].last))
            .slice(0, 5);

        recent.forEach(name => {
            const item = document.createElement('div');
            item.className = 'ticker-item';
            item.innerHTML = `<span class="ticker-label">SON GELEN:</span> ${name.toUpperCase()} (${calculateDays(scenarios[name].last)} GÜN ÖNCE)`;
            ticker.appendChild(item);
        });
    }

    function showDetail(name, element, days) {
        document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        const data = scenarios[name];
        let itemsHtml = data.items.map(item => `
            <div class="product-card">
                <span class="product-name">${item.split(' Q')[0]}</span>
                <span style="color:var(--neon-blue); font-family:'Share Tech Mono'; font-size:0.8em;">HEDEF: Q${item.split(' Q')[1]}</span>
            </div>
        `).join('');

        document.getElementById('detail-panel').innerHTML = `
            <div class="pool-header">
                <h1 class="pool-title">${name}</h1>
                <div style="color:#888; margin-top:10px; font-family:'Share Tech Mono'">
                    DURUM: <span style="color:var(--neon-pink)">${days} GÜNDÜR BEKLEMEDE</span>
                </div>
            </div>
            <div class="product-grid">${itemsHtml}</div>
        `;
    }

    init();
</script>

</body>
</html>
