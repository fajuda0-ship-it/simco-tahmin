<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimCo Üretim Planlayıcı</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl p-6">
        <h1 class="text-2xl font-black mb-6 text-center text-green-500 tracking-tight">SIMCO ÜRETİM PLANLAYICI</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-zinc-500">Bina Seçimi</label>
                    <select id="bina-sec" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700 outline-none">
                        <option value="enerji">Enerji Santrali</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500">Bina Seviyesi</label>
                        <input type="number" id="bina-lv" value="1" min="1" max="20" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500">Üretim Bonusu (%)</label>
                        <input type="number" id="uretim-bonusu" value="0" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500">Ham Yönetim (%)</label>
                        <input type="number" id="ham-admin" value="22.35" step="0.01" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500">COO Becerisi</label>
                        <input type="number" id="coo-skill" value="30" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] uppercase font-bold text-zinc-500">Hedef Üretim Miktarı</label>
                    <input type="number" id="hedef-adet" value="5000" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700 border-green-900 focus:border-green-500 outline-none transition-all">
                </div>
            </div>

            <div class="bg-black/40 rounded-xl p-6 border border-zinc-800 flex flex-col justify-center space-y-6">
                <div class="text-center">
                    <p class="text-[10px] uppercase text-zinc-500">Gerçek Birim Maliyet</p>
                    <h2 id="res-birim-maliyet" class="text-5xl font-black text-white">$0.000</h2>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-zinc-800 pt-6 text-sm">
                    <div>
                        <p class="text-[10px] text-zinc-500 uppercase">Net Admin</p>
                        <p id="res-net-admin" class="font-bold text-blue-400">%0.00</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-zinc-500 uppercase">Gereken Süre</p>
                        <p id="res-sure" class="font-bold text-zinc-200">0 Saat</p>
                    </div>
                    <div class="col-span-2 pt-2">
                        <p class="text-[10px] text-zinc-500 uppercase">Toplam Kasa Çıkışı</p>
                        <p id="res-toplam-maliyet" class="text-2xl font-black text-green-500">$0.00</p>
                    </div>
                </div>
            </div>
        </div>
        <p class="mt-6 text-[9px] text-center text-zinc-600 italic">Veriler Harsh Sachdev (COO) algoritması ile hesaplanmaktadır.</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
