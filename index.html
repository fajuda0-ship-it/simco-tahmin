<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #display { font-size: 150px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="display">YÜKLENİYOR...</div>
    <script>
        async function get() {
            try {
                // Kendi sitenin API ucuna git
                const r = await fetch('/api/price');
                const d = await r.json();
                document.getElementById('display').innerText = d.price ? "$" + d.price : "VERİ YOK";
            } catch (e) {
                document.getElementById('display').innerText = "HATA";
            }
        }
        get();
        setInterval(get, 30000);
    </script>
</body>
</html>
