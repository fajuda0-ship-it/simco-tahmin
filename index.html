<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimCo İnşaat & Yıkım Planlayıcı</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; position: relative; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 10px; font-size: 1.5rem; }
        .bina-konteynir { display: flex; justify-content: center; align-items: center; background: #fdfdfd; border: 1px dashed #ddd; border-radius: 10px; margin-bottom: 15px; height: 120px; overflow: hidden; }
        .bina-img { height: 100%; width: auto; object-fit: contain; }
        .section-title { font-weight: bold; margin-top: 20px; color: #34495e; border-left: 4px solid #3498db; padding-left: 10px; font-size: 14px; }
        .yikim-title { border-left-color: #e74c3c; color: #c0392b; }
        label { display: block; margin-top: 10px; font-size: 13px; color: #7f8c8d; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 14px; }
        .price-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .result-box { margin-top: 20px; padding: 12px; border-radius: 10px; }
        .res-yapim { background: #ebf5fb; border: 1px solid #d6eaf8; }
        .res-yikim { background: #fdf2f2; border: 1px solid #fadbd8; margin-top: 10px; }
        .res-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; }
        .total-price { font-size: 16px; font-weight: bold; text-align: center; margin-top: 8px; padding-top: 5px; border-top: 1px solid rgba(0,0,0,0.1); }
        .color-yapim { color: #2980b9; }
        .color-yikim { color: #c0392b; }
    </style>
</head>
<body>

<div class="card">
    <div class="bina-konteynir">
        <img id="binaGorsel" src="" alt="Görsel Bekleniyor..." class="bina-img">
    </div>

    <h2>🏗️ SimCo Planlayıcı</h2>

    <label>Bina Seç:</label>
    <select id="binaSec" onchange="hesapla()">
        <option value="bakkal">Bakkal (Grocery Store)</option>
        <option value="fabrika">Fabrika (Factory)</option>
        <option value="tarla">Tarla (Plantation)</option>
        <option value="muteahhit">Genel Müteahhit (General Contractor)</option>
        <option value="elektronik">Elektronik Fabrikası (Electronics Factory)</option>
        <option value="ciftlik">Çiftlik (Farm)</option>
        <option value="yiyecek">Yiyecek İşleme Merkezi (Food Processing)</option>
        <option value="yemek_servisi">Yemek Servisi (Catering)</option>
        <option value="degirmen">Değirmen (Mill)</option>
        <option value="icecek">İçecek Fabrikası (Beverage Factory)</option>
        <option value="firin">Fırın (Bakery)</option>
        <option value="beton_santrali">Beton Santrali (Concrete Plant)</option>
        <option value="insaat_fabrikasi">İnşaat Fabrikası (Construction Factory)</option>
    </select>

    <div class="section-title">Yapım / Geliştirme</div>
    <div style="display: flex; gap: 8px;">
        <div style="flex: 1;"><label>Mevcut Seviye:</label><input type="number" id="mevcutLvl" value="1" min="0" oninput="hesapla()"></div>
        <div style="flex: 1;"><label>Hedef Seviye:</label><input type="number" id="hedefLvl" value="2" min="1" oninput="hesapla()"></div>
    </div>

    <div class="section-title yikim-title">Yıkım</div>
    <label>Yıkılacak Seviye:</label>
    <input type="number" id="yikimLvl" value="1" min="1" oninput="hesapla()">

    <div class="section-title">Birim Fiyatlar ($)</div>
    <div class="price-inputs">
        <div><label>Beton:</label><input type="number" id="p_beton" value="216" oninput="hesapla()"></div>
        <div><label>Tuğla:</label><input type="number" id="p_tugla" value="2.50" oninput="hesapla()"></div>
        <div><label>Kereste:</label><input type="number" id="p_kereste" value="10.50" oninput="hesapla()"></div>
        <div><label>İnş.Gereci:</label><input type="number" id="p_arac" value="2400" oninput="hesapla()"></div>
    </div>

    <div class="result-box res-yapim">
        <div style="font-weight:bold; color:#2980b9; margin-bottom:5px; font-size: 13px;">İnşaat İçin Gereken:</div>
        <div id="yapimMiktar"></div>
        <div class="total-price color-yapim" id="yapimToplam">Toplam: $0</div>
    </div>

    <div class="result-box res-yikim">
        <div style="font-weight:bold; color:#c0392b; margin-bottom:5px; font-size: 13px;">Yıkımdan İade Değeri:</div>
        <div id="yikimMiktar"></div>
        <div class="total-price color-yikim" id="yikimToplam">İade: $0</div>
    </div>
</div>

<script>
    const binalar = {
        bakkal: { beton: 12, tugla: 165, kereste: 48, arac: 3, driveId: "1iT1XOz2N5Eoz5kczQ1cfV_6cd5GTzQwo" },
        fabrika: { beton: 56, tugla: 770, kereste: 224, arac: 14, driveId: "" },
        tarla: { beton: 8, tugla: 110, kereste: 32, arac: 2, driveId: "" },
        muteahhit: { beton: 56, tugla: 770, kereste: 224, arac: 14, driveId: "" },
        elektronik: { beton: 96, tugla: 1320, kereste: 384, arac: 24, driveId: "" },
        ciftlik: { beton: 12, tugla: 165, kereste: 48, arac: 3, driveId: "" },
        yiyecek: { beton: 100, tugla: 1375, kereste: 400, arac: 25, driveId: "" },
        yemek_servisi: { beton: 120, tugla: 1650, kereste: 480, arac: 30, driveId: "" },
        degirmen: { beton: 32, tugla: 440, kereste: 128, arac: 8, driveId: "" },
        icecek: { beton: 16, tugla: 220, kereste: 64, arac: 4, driveId: "" },
        firin: { beton: 44, tugla: 605, kereste: 176, arac: 11, driveId: "" },
        beton_santrali: { beton: 68, tugla: 935, kereste: 272, arac: 17, driveId: "" },
        insaat_fabrikasi: { beton: 84, tugla: 1155, kereste: 336, arac: 21, driveId: "" }
    };

    function hesapla() {
        const binaTuru = document.getElementById('binaSec').value;
        const temel = binalar[binaTuru];
        
        const gorselElement = document.getElementById('binaGorsel');
        if (temel.driveId) {
            gorselElement.src = "https://lh3.googleusercontent.com/u/0/d/" + temel.driveId;
        } else {
            gorselElement.src = "";
            gorselElement.alt = binaTuru.toUpperCase() + " görseli yok";
        }

        const f = {
            beton: parseFloat(document.getElementById('p_beton').value) || 0,
            tugla: parseFloat(document.getElementById('p_tugla').value) || 0,
            kereste: parseFloat(document.getElementById('p_kereste').value) || 0,
            arac: parseFloat(document.getElementById('p_arac').value) || 0
        };

        const mevcut = parseInt(document.getElementById('mevcutLvl').value) || 0;
        const hedef = parseInt(document.getElementById('hedefLvl').value) || 0;
        let yap = { b: 0, t: 0, k: 0, a: 0 };

        if (hedef > mevcut) {
            for (let i = mevcut; i < hedef; i++) {
                let katsayi = 0;
                // Listeye eklediğimiz neredeyse tüm binalar 1'den 2'ye geçerken maliyet artışı yaşamıyor.
                if (['tarla', 'muteahhit', 'fabrika', 'elektronik', 'ciftlik', 'yiyecek', 'yemek_servisi', 'degirmen', 'icecek', 'firin', 'beton_santrali', 'insaat_fabrikasi'].includes(binaTuru)) {
                    katsayi = (i === 0 || i === 1) ? 1 : i;
                } else {
                    katsayi = (i === 0) ? 1 : i;
                }
                yap.b += katsayi * temel.beton;
                yap.t += katsayi * temel.tugla;
                yap.k += katsayi * temel.kereste;
                yap.a += katsayi * temel.arac;
            }
        }
        renderSonuc('yapimMiktar', 'yapimToplam', yap, f);

        const yikimLvl = parseInt(document.getElementById('yikimLvl').value) || 0;
        let yik = {
            b: yikimLvl * temel.beton,
            t: yikimLvl * temel.tugla,
            k: yikimLvl * temel.kereste,
            a: yikimLvl * temel.arac
        };
        renderSonuc('yikimMiktar', 'yikimToplam', yik, f);
    }

    function renderSonuc(miktarId, toplamId, miktar, fiyat) {
        const toplam = (miktar.b * fiyat.beton) + (miktar.t * fiyat.tugla) + (miktar.k * fiyat.kereste) + (miktar.a * fiyat.arac);
        document.getElementById(miktarId).innerHTML = `
            <div class="res-row"><span>Beton:</span> <b>${miktar.b.toLocaleString()}</b></div>
            <div class="res-row"><span>Tuğla:</span> <b>${miktar.t.toLocaleString()}</b></div>
            <div class="res-row"><span>Kereste:</span> <b>${miktar.k.toLocaleString()}</b></div>
            <div class="res-row"><span>İnş.Ger:</span> <b>${miktar.a.toLocaleString()}</b></div>
        `;
        document.getElementById(toplamId).innerText = `Değer: $${toplam.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }

    window.onload = hesapla;
</script>
</body>
</html>
