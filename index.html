<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Strateji Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #eee; font-family: 'Share Tech Mono', monospace; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; border: 1px solid #333; padding: 20px; background: #0a0a0a; }
        
        .timer-box { text-align: center; border: 1px solid #ff00ff; padding: 15px; margin-bottom: 20px; color: #ff00ff; font-size: 2em; }
        .alert { color: #ff00ff; text-align: center; font-size: 0.8em; margin-bottom: 20px; letter-spacing: 2px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { border-bottom: 2px solid #444; color: #00d4ff; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        
        .high-pct { color: #00d4ff; font-weight: bold; }
        .footer { margin-top: 30px; text-align: center; color: #444; font-size: 1.5em; letter-spacing: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="alert">DİKKAT: BU VERİLER SADECE SAB ÜYELERİNE ÖZELDİR</div>

    <div class="timer-box" id="timer">00G 00S 00D 00S</div>

    <table>
        <thead>
            <tr>
                <th>ÜRÜN ADI</th>
                <th>TRAFİK PAYI (%)</th>
                <th>DURUM</th>
            </tr>
        </thead>
        <tbody id="data-table">
            </tbody>
    </table>

    <div class="footer">MADE IN: SAB</div>
</div>

<script>
    // Salı 16:00 Geri Sayımı
    function updateTimer() {
        const now = new Date();
        let target = new Date();
        target.setDate(now.getDate() + (2 + 7 - now.getDay()) % 7);
        target.setHours(16, 0, 0, 0);
        if (now > target) target.setDate(target.getDate() + 7);
        
        const d = target - now;
        const days = Math.floor(d / 86400000);
        const hrs = Math.floor((d % 86400000) / 3600000);
        const mins = Math.floor((d % 3600000) / 60000);
        const secs = Math.floor((d % 60000) / 1000);
        document.getElementById('timer').innerText = `${days}G ${hrs}S ${mins}D ${secs}S`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // Veri Seti (Büyükten Küçüğe Sıralı)
    const data = [
        {ad: "Robotlar", p: 12.4, d: "2026-03-04"},
        {ad: "E-Bileşenler", p: 9.1, d: "2026-03-04"},
        {ad: "Çelik", p: 7.8, d: "2025-11-05"},
        {ad: "Pil", p: 6.9, d: "2025-11-05"},
        {ad: "İşlemci", p: 5.5, d: "2025-12-31"},
        {ad: "Yazılım", p: 4.4, d: "2025-11-12"},
        {ad: "Ekranlar", p: 3.9, d: "2026-02-18"},
        {ad: "Tabletler", p: 3.5, d: "2026-02-18"},
        {ad: "Dizüstü", p: 3.1, d: "2026-02-18"},
        {ad: "Samosa", p: 1.4, d: "2026-02-01"},
        {ad: "Kamyon", p: 1.4, d: "2025-11-13"}
    ];

    const tbody = document.getElementById('data-table');
    const TODAY = new Date();

    // % Payına göre büyükten küçüğe sırala
    data.sort((a,b) => b.p - a.p).forEach(item => {
        const diff = Math.floor((TODAY - new Date(item.d)) / (1000*60*60*24));
        const row = `<tr>
            <td>${item.ad}</td>
            <td class="high-pct">%${item.p}</td>
            <td>${diff} GÜN ÖNCE</td>
        </tr>`;
        tbody.innerHTML += row;
    });
</script>
</body>
</html>
