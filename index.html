<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Kontrol Merkezi v23.0 // SECURE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2f81f7; --bg: #0d1117; --sidebar-bg: #161b22; --border: #30363d; --text: #c9d1d9; --up: #3fb950; --down: #f85149; }
        
        /* GİRİŞ EKRANI STİLLERİ */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s;
        }
        .login-box {
            background: var(--sidebar-bg); padding: 40px; border-radius: 12px;
            border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;
        }
        .login-box h1 { color: var(--accent); font-size: 1.5em; margin-bottom: 10px; }
        .login-box p { font-size: 0.85em; color: #8b949e; margin-bottom: 25px; line-height: 1.6; }
        .login-input {
            width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border);
            color: white; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box;
            text-align: center; font-family: 'Roboto Mono';
        }
        .login-btn {
            width: 100%; padding: 12px; background: var(--accent); border: none;
            color: white; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s;
        }
        .login-btn:hover { background: #4493f8; }

        /* ANA SİSTEM STİLLERİ (ÖNCEKİLERLE AYNI) */
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--sidebar-bg); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-family: 'Roboto Mono'; font-size: 0.85em; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .nav-btn { padding: 15px; border-radius: 6px; border: 1px solid var(--border); background: #21262d; color: var(--text); cursor: pointer; font-weight: bold; text-align: left; font-size: 0.9em; }
        .nav-btn.active { background: var(--accent); color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .ticker { background: #010409; height: 35px; border-top: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; }
        .ticker-inner { display: inline-block; padding-left: 100%; animation: scroll 60s linear infinite; white-space: nowrap; font-family: 'Roboto Mono'; font-size: 0.85em; color: #8b949e; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        /* (Diğer tablolar ve kart stilleri buraya dahil) */
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h1>SAB ÜYE GİRİŞİ</h1>
        <p>SİSTEME GİRMEK İÇİN KENDİNİZE AİT ŞİFREYİ TOPLANTI KANALINDAN ALIN.</p>
        <input type="password" id="passkey" class="login-input" placeholder="Erişim Şifresi">
        <button class="login-btn" onclick="checkAuth()">SİSTEME GİRİŞ YAP</button>
        <div id="login-error" style="color:var(--down); font-size:0.8em; margin-top:10px; display:none;">Hatalı şifre, lütfen kanalı kontrol edin.</div>
    </div>
</div>

<div class="header">
    <div style="font-weight: bold; color: var(--accent);">SAB CORE TERMINAL v23.0</div>
    <div>SİSTEM TARİHİ: 13 MART 2026</div>
</div>

<div class="container">
    <div class="sidebar">
        <button class="nav-btn active" id="btn-tenders" onclick="switchTab('tenders')">İHALE TERMİNALİ</button>
        <button class="nav-btn" id="btn-companies" onclick="switchTab('companies')">ŞİRKET DEĞERLERİ</button>
        <button class="nav-btn" id="btn-economy" onclick="switchTab('economy')">EKONOMİK EVRE</button>
    </div>
    <div class="main-content" id="main-view"></div>
</div>

<div class="ticker"><div class="ticker-inner" id="tick"></div></div>

<script>
    // ŞİFRE KONTROLÜ
    function checkAuth() {
        const pass = document.getElementById('passkey').value;
        // Buraya istediğin şifreyi yazabilirsin, ben örnek olarak 'SAB2026' koydum.
        if(pass === "SAB2026") { 
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
            }, 500);
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    // TERMİNAL MANTIĞI VE VERİLER
    function switchTab(tab) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        const view = document.getElementById('main-view');

        if (tab === 'tenders') {
            view.innerHTML = `<h2>Aktif İhale Paketleri</h2><p>Veriler senkronize edildi...</p>`;
            // (Önceki ihale listeleme fonksiyonlarını buraya ekleyebilirsin)
        } else if (tab === 'companies') {
            view.innerHTML = `<h2>SAB Şirket Portföyleri</h2>`;
        } else if (tab === 'economy') {
            view.innerHTML = `<h2>Ekonomik Evre Analizi</h2>`;
        }
    }

    // Ticker Hazırlama
    const tick = document.getElementById('tick');
    tick.innerHTML = "SİSTEM TEST AŞAMASINDADIR | SADECE SAB ÜYELERİNE AÇIKTIR | TOPLANTI KANALINI TAKİP EDİN | " + new Array(10).join("GÜNCEL VERİ AKIŞI AKTİF - ");

    // Başlangıç
    switchTab('tenders');
</script>

</body>
</html>
