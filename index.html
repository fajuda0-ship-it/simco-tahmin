<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Holding & Analiz Terminali</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #34d399; --bg: #0b0e14; --sidebar-bg: #151921; --border: #262c36; --text: #d1d5db; --up: #10b981; --down: #ef4444; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Üst Header */
        .header { background: var(--sidebar-bg); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: 'Roboto Mono'; font-size: 0.85em; }
        .live-status { display: flex; gap: 20px; }
        .status-up { color: var(--up); }

        .container { display: flex; flex: 1; overflow: hidden; }

        /* Sol: İhale Analiz Listesi */
        .sidebar { width: 380px; background: var(--sidebar-bg); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-title { padding: 15px; font-size: 0.75em; letter-spacing: 2px; color: #6b7280; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .item { padding: 12px 15px; border-bottom: 1px solid #1f2937; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.82em; transition: 0.2s; }
        .item:hover { background: #1f2937; }
        .item.active { background: #2563eb; color: white; border-left: 4px solid var(--accent); }
        .item .days-label { font-family: 'Roboto Mono'; color: #9ca3af; font-size: 0.9em; }

        /* Sağ: Borsa ve Üye Şirketler Paneli */
        .main-panel { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        
        /* Şirket Tablosu */
        .company-table { width: 100%; border-collapse: collapse; font-size: 0.85em; background: #111827; border-radius: 8px; overflow: hidden; }
        .company-table th { text-align: left; background: #1f2937; padding: 12px; color: #9ca3af; font-weight: 500; }
        .company-table td { padding: 12px; border-bottom: 1px solid #1f2937; }
        .val-up { color: var(--up); font-family: 'Roboto Mono'; }
        .val-down { color: var(--down); font-family: 'Roboto Mono'; }

        /* Alt Kayan Ekran (Ticker) */
        .ticker-bar { background: #000; height: 35px; border-top: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; }
        .ticker-wrap { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scroll-ticker 45s linear infinite; }
        .ticker-item { display: inline-block; margin-right: 50px; font-family: 'Roboto Mono'; font-size: 0.8em; }

        @keyframes scroll-ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: var(--accent);">SAB TERMINAL v19 // PORTFOLIO MONITOR</div>
    <div class="live-status">
        <span>İŞLEM HACMİ: <span class="status-up">$1.48B</span></span>
        <span>SİSTEM TARİHİ: 13 MART 2026</span>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-title">İhale Veri Tabanı</div>
        <div id="tender-list"></div>
    </div>

    <div class="main-panel" id="main-view">
        <h2 style="margin-top:0; font-size:1.2em; color: #f3f4f6;">SAB ÜYESİ ŞİRKETLER VE PORTFÖY DEĞERLERİ</h2>
        
        <table class="company-table">
            <thead>
                <tr>
                    <th>Şirket Adı</th>
                    <th>Değerleme</th>
                    <th>Günlük Değişim</th>
                    <th>Piyasa Sırası</th>
                </tr>
            </thead>
            <tbody id="company-body">
                </tbody>
        </table>

        <div id="tender-detail" style="margin-top:30px; display:none;">
            </div>
    </div>
</div>

<div class="ticker-bar">
    <div class="ticker-wrap" id="ticker-content"></div>
</div>

<script>
    const now = new Date("2026-03-13");

    // Şirket Verileri
    const companies = [
        { n: "Nature Holding", v: "$409,683,093", chg: "+$458,096", pct: "%0.11", rank: "23,739" },
        { n: "HY Motorlu Araclar Comp.", v: "$99,987,287", chg: "+$641,471", pct: "%0.65", rank: "33,798" },
        { n: "SAYAR IPSALA HOLDING", v: "$97,374,114", chg: "+$1,633,103", pct: "%1.71", rank: "43,811" },
        { n: "HASYER", v: "$97,003,229", chg: "-$742,779", pct: "-%0.76", rank: "54,534" },
        { n: "Meganirvana", v: "$74,476,973", chg: "+$480,606", pct: "%0.65", rank: "64,580" },
        { n: "Brhnblci", v: "$73,191,711", chg: "+$1,653,428", pct: "%2.31", rank: "74,614" },
        { n: "Arapid Inc.", v: "$72,463,973", chg: "+$779,637", pct: "%1.09", rank: "84,965" },
        { n: "Yanko Inc. Corp.", v: "$64,158,825", chg: "+$1,192,347", pct: "%1.89", rank: "95,445" },
        { n: "MAGNETRON", v: "$55,228,057", chg: "+$223,989", pct: "%0.41", rank: "105,658" },
        { n: "KAMALI INVESTIGATIVE", v: "$51,785,124", chg: "-$11,703", pct: "-%0.02", rank: "116,278" }
    ];

    // İhale Verileri (Eksiksiz)
    const tenders = {
        "İleri Robotik": { c: 15, d: "2026-03-04", i: ["Robotlar Q0", "İşlemci Q2", "Elektronik B. Q0"] },
        "Mars Gezgini": { c: 11, d: "2025-11-19", i: ["Pil Q3", "Havacılık Arş. Q0", "Robotlar Q3"] },
        "Hava Kalitesi": { c: 12, d: "2025-12-10", i: ["Kimyasal Q3", "Ekranlar Q0"] },
        "Yakıt Rezervleri": { c: 7, d: "2025-11-12", i: ["Metan Q2", "Etanol Q3", "Petrol Q0"] },
        "E-öğrenme Cihazları": { c: 9, d: "2026-02-18", i: ["Tabletler Q3", "Dizüstü Q0"] }
    };

    function init() {
        // Şirketleri Tabloya Diz
        const cBody = document.getElementById('company-body');
        companies.forEach(c => {
            const isUp = !c.chg.includes('-');
            cBody.innerHTML += `
                <tr>
                    <td style="font-weight:bold;">${c.n}</td>
                    <td class="val-up">${c.v}</td>
                    <td class="${isUp ? 'val-up' : 'val-down'}">${c.chg} (${c.pct})</td>
                    <td style="color:#6b7280;">#${c.rank}</td>
                </tr>
            `;
        });

        // İhaleleri Sola Diz
        const tList = document.getElementById('tender-list');
        const ticker = document.getElementById('ticker-content');
        
        Object.keys(tenders).forEach(name => {
            const days = Math.floor((now - new Date(tenders[name].d)) / 86400000);
            tList.innerHTML += `
                <div class="item" onclick="showTender('${name}', ${days})">
                    <span>${name}</span>
                    <span class="days-label">${days} GÜN</span>
                </div>
            `;
            ticker.innerHTML += `<span class="ticker-item">${name.toUpperCase()}: ${days} GÜN ÖNCE</span>`;
        });
    }

    function showTender(name, days) {
        const info = tenders[name];
        const detail = document.getElementById('tender-detail');
        detail.style.display = 'block';
        detail.innerHTML = `
            <div style="background:#1f2937; padding:20px; border-radius:8px; border-left:4px solid var(--accent);">
                <h3 style="margin-top:0; color:var(--accent);">${name} ANALİZİ</h3>
                <p style="font-size:0.9em; color:#9ca3af;">Son görülme üzerinden <b>${days} gün</b> geçti. Toplam ${info.c} kez ihale edildi.</p>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    ${info.i.map(p => `<span style="background:#111827; padding:8px 12px; border-radius:4px; font-size:0.8em; border:1px solid #374151;">${p}</span>`).join('')}
                </div>
            </div>
        `;
    }

    init();
</script>

</body>
</html>
