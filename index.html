<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Kontrol Merkezi v22.0 // FULL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2f81f7; --bg: #0d1117; --sidebar-bg: #161b22; --border: #30363d; --text: #c9d1d9; --up: #3fb950; --down: #f85149; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: var(--sidebar-bg); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-family: 'Roboto Mono'; font-size: 0.85em; z-index: 10; }
        .container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sol Navigasyon */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .sidebar-title { font-size: 0.7em; color: #8b949e; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .nav-btn { padding: 15px; border-radius: 6px; border: 1px solid var(--border); background: #21262d; color: var(--text); cursor: pointer; font-weight: bold; text-align: left; transition: 0.2s; font-size: 0.9em; }
        .nav-btn:hover { background: #30363d; border-color: #8b949e; }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }

        /* Ekonomi Paneli Özel Stiller */
        .eco-card { background: #1c2128; border: 1px solid var(--border); padding: 25px; border-radius: 12px; max-width: 600px; margin: 0 auto; }
        .countdown-timer { font-size: 1.2em; color: var(--up); background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid var(--border); font-family: 'Roboto Mono'; }
        .phase-btn-group { display: flex; gap: 10px; margin: 15px 0; }
        .phase-btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; opacity: 0.4; transition: 0.3s; }
        .phase-btn.active { opacity: 1; outline: 2px solid white; }
        .BOOM { background: #d32f2f; } .NORMAL { background: #1976d2; } .RECESSION { background: #7b1fa2; }
        .eco-input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 5px; margin-bottom: 15px; }
        .calc-btn { width: 100%; padding: 15px; background: var(--up); border: none; color: #0d1117; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1em; }
        
        /* Tablolar ve Listeler */
        .company-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .company-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: #8b949e; }
        .company-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .tender-layout { display: flex; gap: 20px; height: 100%; }
        .tender-list-wrap { width: 400px; border-right: 1px solid var(--border); overflow-y: auto; padding-right: 15px; }
        
        /* Ticker */
        .ticker { background: #010409; height: 35px; border-top: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; }
        .ticker-inner { display: inline-block; padding-left: 100%; animation: scroll 60s linear infinite; white-space: nowrap; font-family: 'Roboto Mono'; font-size: 0.85em; color: #8b949e; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: var(--accent);">SAB CORE TERMINAL v22.0</div>
    <div id="sys-date">13 MART 2026</div>
</div>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-title">Sistem Navigasyonu</div>
        <button class="nav-btn active" id="btn-tenders" onclick="switchTab('tenders')">İHALE TERMİNALİ</button>
        <button class="nav-btn" id="btn-companies" onclick="switchTab('companies')">ŞİRKET DEĞERLERİ</button>
        <button class="nav-btn" id="btn-economy" onclick="switchTab('economy')">EKONOMİK EVRE</button>
        <div style="margin-top: auto; font-size: 0.7em; color: #484f58; text-align: center;">SAB Integrated Systems v22</div>
    </div>

    <div class="main-content" id="main-view"></div>
</div>

<div class="ticker">
    <div class="ticker-inner" id="tick"></div>
</div>

<script>
    let selectedPhase = '';
    const now = new Date("2026-03-13");

    // VERİ TABANLARI (İhale ve Şirket)
    const tenderData = {
        "İleri Robotik": { c: 15, d: "2026-03-04", i: ["Robotlar Q0", "Elektronik bileşenler Q0", "Yüksek seviye e-bilgisayar Q2"] },
        "Hava Kalitesi İzleme": { c: 12, d: "2025-12-10", i: ["Kimyasal Q3", "Akıllı Telefonlar Q1", "Ekranlar Q0"] },
        "Mars Gezgini": { c: 11, d: "2025-11-19", i: ["Pil Q3", "Havacılık araştırması Q0", "Robotlar Q3"] },
        "Sürdürülebilir Tarım": { c: 9, d: "2026-01-21", i: ["Su Q3", "Tahıl Q0"] },
        "E-öğrenme Cihazları": { c: 9, d: "2026-02-18", i: ["Tabletler Q3", "Dizüstü Q0", "Ekranlar Q3"] },
        "Ezilme Testleri": { c: 8, d: "2026-03-04", i: ["Ekonomik elektrikli araba Q1", "Oto karoseri Q2", "Temel iç kısım Q2"] },
        "Yıldız Gemisi Geliştirme": { c: 8, d: "2026-01-28", i: ["Yıldız gemisi Q3", "Roket Yakıtı Q3"] },
        "Veri Merkezi": { c: 8, d: "2025-12-31", i: ["Yerleşik bilgisayar Q0", "İşlemci Q2"] },
        "Akıllı Yollar": { c: 7, d: "2026-03-04", i: ["Monitör Q0", "Akıllı Telefonlar Q0", "Elektronik bileşenler Q2"] },
        "Yakıt Rezervleri": { c: 7, d: "2025-11-12", i: ["Metan Q2", "Etanol Q3", "Petrol Q0"] }
    };

    const companyData = [
        { n: "Nature Holding", v: "409.683.093", chg: "+458.096", p: "%0,11", r: "23.739" },
        { n: "HY Motorlu Araclar Comp.", v: "99.987.287", chg: "+641.471", p: "%0,65", r: "33.798" },
        { n: "SAYAR IPSALA HOLDING", v: "97.374.114", chg: "+1.633.103", p: "%1,71", r: "43.811" },
        { n: "HASYER", v: "97.003.229", chg: "-742.779", p: "-%0,76", r: "54.534" },
        { n: "Meganirvana", v: "74.476.973", chg: "+480.606", p: "%0,65", r: "64.580" },
        { n: "Brhnblci", v: "73.191.711", chg: "+1.653.428", p: "%2,31", r: "74.614" },
        { n: "Arapid Inc.", v: "72.463.973", chg: "+779.637", p: "%1,09", r: "84.965" },
        { n: "Yanko Inc. Corp.", v: "64.158.825", chg: "+1.192.347", p: "%1,89", r: "95.445" }
    ];

    function switchTab(tab) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        const view = document.getElementById('main-view');

        if (tab === 'tenders') {
            view.innerHTML = `<div class="tender-layout"><div class="tender-list-wrap"><div id="t-list"></div></div><div id="t-detail" style="flex:1; padding:20px;"></div></div>`;
            loadTenders();
        } else if (tab === 'companies') {
            view.innerHTML = `<h2>SAB ŞİRKET LİSTESİ</h2><table class="company-table"><thead><tr><th>Şirket</th><th>Değer</th><th>Değişim</th><th>Sıra</th></tr></thead><tbody id="c-body"></tbody></table>`;
            loadCompanies();
        } else if (tab === 'economy') {
            view.innerHTML = `
                <div class="eco-card">
                    <div class="countdown-timer" id="eco-timer">Yükleniyor...</div>
                    <label>Mevcut Ekonomi Evresi:</label>
                    <div class="phase-btn-group">
                        <button class="phase-btn RECESSION" onclick="setPhase('RECESSION', this)">RESESYON</button>
                        <button class="phase-btn NORMAL" onclick="setPhase('NORMAL', this)">NORMAL</button>
                        <button class="phase-btn BOOM" onclick="setPhase('BOOM', this)">BOOM</button>
                    </div>
                    <label>Bu Evrede Kaçıncı Gün?</label>
                    <input type="number" id="eco-days" class="eco-input" value="14">
                    <button class="calc-btn" onclick="runEcoLogic()">OLASILIKLARI ANALİZ ET</button>
                    <div id="eco-result" style="margin-top:20px; display:none; padding:15px; background:#0d1117; border-radius:8px; border-left:4px solid var(--up);"></div>
                </div>`;
            startEcoTimer();
        }
    }

    // Ekonomi Mantığı
    function setPhase(p, btn) {
        selectedPhase = p;
        document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function runEcoLogic() {
        if(!selectedPhase) return alert("Evre seçin!");
        const days = document.getElementById('eco-days').value;
        const res = selectedPhase === 'BOOM' ? "NORMAL'e Dönüş %72" : (selectedPhase === 'RECESSION' ? "NORMAL'e Çıkış %68" : "BOOM %22 | RESESYON %18");
        const out = document.getElementById('eco-result');
        out.style.display = 'block';
        out.innerHTML = `<strong>Analiz Sonucu:</strong><br><span style="color:var(--up); font-family:Roboto Mono;">${res}</span><br><br><small style="color:#8b949e;">*${days}. gün verilerine göre stabilize edilmiştir.</small>`;
    }

    function startEcoTimer() {
        const update = () => {
            const now = new Date();
            const next = new Date();
            next.setDate(now.getDate() + (5 - now.getDay() + 7) % 7);
            next.setHours(18,0,0,0);
            const d = next - now;
            const h = Math.floor(d/3600000);
            const m = Math.floor((d%3600000)/60000);
            const s = Math.floor((d%60000)/1000);
            const el = document.getElementById('eco-timer');
            if(el) el.innerText = `Cuma 18:00 Değişimine: ${h}s ${m}d ${s}sn`;
        };
        setInterval(update, 1000); update();
    }

    // Listeleme Fonksiyonları
    function loadTenders() {
        const list = document.getElementById('t-list');
        Object.keys(tenderData).forEach(name => {
            const el = document.createElement('div');
            el.className = 'item';
            el.innerHTML = `<span>${name}</span><span>${tenderData[name].c}x</span>`;
            el.onclick = () => showTender(name);
            list.appendChild(el);
        });
    }

    function showTender(name) {
        const info = tenderData[name];
        document.getElementById('t-detail').innerHTML = `<h3>${name}</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">${info.i.map(x => `<div style="background:#161b22; padding:10px; border:1px solid #30363d; border-radius:5px;">${x}</div>`).join('')}</div>`;
    }

    function loadCompanies() {
        const body = document.getElementById('c-body');
        companyData.forEach(c => {
            body.innerHTML += `<tr><td>${c.n}</td><td>$${c.v}</td><td style="color:${c.chg.includes('+')?'var(--up)':'var(--down)'}">${c.chg}</td><td>#${c.r}</td></tr>`;
        });
    }

    // Ticker Yönetimi
    const tick = document.getElementById('tick');
    const warning = " <b style='color:#ffa000;'>[!!] BU SİSTEM HENÜZ TEST AŞAMASINDADIR. DOĞRULUK VERİLERİNE GÖRE NİHAİ HALİNİ ALACAKTIR. SADECE SAB ÜYELERİNE AÇIKTIR.</b>";
    let tickerContent = "";
    Object.keys(tenderData).forEach(n => tickerContent += `${n.toUpperCase()} ANALİZİ AKTİF | `);
    tick.innerHTML = tickerContent + warning;

    switchTab('tenders');
</script>
</body>
</html>
