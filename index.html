function updateTable(filter = "") {
    const tbody = document.getElementById('tenderBody');
    tbody.innerHTML = "";
    
    tenderData.forEach(t => {
        if (!t.name.toLowerCase().includes(filter.toLowerCase()) && 
            !t.items.toLowerCase().includes(filter.toLowerCase())) return;

        const last = new Date(t.lastSeen);
        const diff = Math.ceil((SYSTEM_DATE - last) / (1000*60*60*24));
        const rem = t.cycle - diff;
        
        let statusClass = rem <= 0 ? "critical" : (rem <= 3 ? "warning" : "upcoming");
        let statusText = rem <= 0 ? `GECİKTİ (+${Math.abs(rem)} GÜN)` : `${rem} GÜN KALDI`;

        tbody.innerHTML += `
            <tr class="${statusClass}">
                <td>${t.name}</td>
                <td style="font-size: 11px;">${t.items}</td>
                <td>${t.cycle} G</td>
                <td>${t.lastSeen}</td>
                <td>${statusText}</td>
            </tr>
        `;
    });
}

document.getElementById('searchInput').addEventListener('input', (e) => updateTable(e.target.value));
