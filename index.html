<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Strateji Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #080808; }
        
        /* Kaydırma sorununu çözen ana ayarlar */
        html, body { 
            background-color: var(--bg-dark); 
            color: #e0e0e0; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-y: auto; /* Kaydırmayı zorunlu açar */
            min-height: 100vh;
        }

        /* Hafif ve kasmayan arka plan efekti */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container { 
            max-width: 1000px; 
            margin: 40px auto; 
            background: rgba(15, 15, 15, 0.9); 
            border: 1px solid #222; 
            padding: 25px; 
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .security-banner {
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 15px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 30px;
            background: rgba(255, 0, 255, 0.05);
            text-transform: uppercase;
        }

        h1 { 
            text-align: center; 
            font-size: 2.2em; 
            color: #fff; 
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .date-box {
            text-align: center;
            color: var(--neon-blue);
            font-family: 'Share Tech Mono', monospace;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; }
        th { border-bottom: 2px solid #333; color: var(--neon-blue); padding: 12px; text-align: left; font-size: 0.9em; }
        td { padding: 12px; border-bottom: 1px solid #1a1a1a; }
        
        .product-name { color: #fff; font-weight: 700; }
        .days-ago { 
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
        }
        .status-new { color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .status-old { color: #ffcc00; border: 1px solid #ffcc00; }
        .status-critical { color: #ff4444; border: 1px solid #ff4444; animation: blink 2s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .footer { 
            margin-top: 50px; 
            text-align: center; 
            padding-bottom: 40px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }
        
        .made-in-logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #444;
            letter-spacing: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="security-banner">
        DİKKAT: BU VERİLER SADECE SAB ÜYELERİNİN KULLANIMINA AÇIKTIR.
    </div>

    <h1>SAB STRATEGY ENGINE</h1>
    <div class="date-box">SİSTEM TARİHİ: 09.03.2026</div>

    <table>
        <thead>
            <tr>
                <th>ÜRÜN</th>
                <th>PAY (%)</th>
                <th>Q1+ (%)</th>
                <th>DURUM</th>
            </tr>
        </thead>
        <tbody id="main-table">
            </tbody>
    </table>

    <div class="footer">
        <div style="font-size: 0.8em; color: #666;">© 2026 STRATEJİ ATILIM BİRLİĞİ - TÜM HAKLARI SAKLIDIR.</div>
        <div class="made-in-logo">MADE IN: SAB</div>
    </div>
</div>

<script>
    const TODAY = new Date("2026-03-09");

    // Senin ihalelerinden süzülen tam liste
    const rawData = [
        {ad: "Robotlar", p: 11.8, q: 28, d: "2026-03-04"},
        {ad: "E-Bileşenler", p: 8.5, q: 22, d: "2026-03-04"},
        {ad: "Çelik", p: 7.2, q: 15, d: "2025-11-05"},
        {ad: "Pil", p: 6.4, q: 19, d: "2025-11-05"},
        {ad: "Yazılım", p: 4.7, q: 35, d: "2025-11-12"},
        {ad: "İşlemci", p: 4.3, q: 31, d: "2025-12-31"},
        {ad: "İnşaat Gereci", p: 4.1, q: 12, d: "2026-01-22"},
        {ad: "Ekranlar", p: 3.8, q: 18, d: "2026-02-18"},
        {ad: "Tabletler", p: 3.5, q: 25, d: "2026-02-18"},
        {ad: "Dizüstü", p: 3.1, q: 27, d: "2026-02-18"},
        {ad: "Akıllı Telefon", p: 1.6, q: 12, d: "2026-03-04"},
        {ad: "Kamyon", p: 1.4, q: 10, d: "2025-11-13"},
        {ad: "BFR", p: 0.9, q: 18, d: "2026-01-07"},
        {ad: "Bal Kabağı", p: 0.8, q: 20, d: "2026-01-29"},
        {ad: "Biftek", p: 1.5, q: 15, d: "2026-02-04"}
    ];

    const table = document.getElementById('main-table');

    rawData.sort((a,b) => b.p - a.p).forEach(item => {
        const lastSeen = new Date(item.d);
        const diff = Math.floor((TODAY - lastSeen) / (1000 * 60 * 60 * 24));
        
        let statusClass = "status-new";
        if(diff > 20) statusClass = "status-old";
        if(diff > 60) statusClass = "status-critical";

        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="product-name">${item.ad}</td>
            <td style="color: var(--neon-blue)">%${item.p}</td>
            <td>%${item.q}</td>
            <td><span class="days-ago ${statusClass}">${diff} GÜN ÖNCE</span></td>
        `;
        table.appendChild(row);
    });
</script>

</body>
</html>
