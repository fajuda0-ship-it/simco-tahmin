<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Strateji Paneli V6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #eee; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* Giriş ekranı için merkezleme */
        }

        /* GİRİŞ EKRANI */
        #login-form { 
            width: 100%; max-width: 400px; background: #0a0a0a; border: 1px solid #222; 
            padding: 40px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,1); 
        }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #888; margin-bottom: 5px; font-size: 0.8em; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; 
            color: #fff; font-family: 'Share Tech Mono', monospace; box-sizing: border-box; 
        }
        button.login-btn { 
            width: 100%; padding: 12px; background: var(--neon-blue); border: none; 
            color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }

        /* ANA PANEL */
        #main-content { display: none; width: 100%; padding: 20px; box-sizing: border-box; }
        .container { 
            max-width: 1100px; margin: 20px auto; background: rgba(10, 10, 10, 0.95); 
            border: 1px solid #222; padding: 30px; position: relative; 
        }
        
        /* ÜST BUTONLAR */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .simco-btn { 
            text-decoration: none; color: var(--neon-blue); border: 1px solid var(--neon-blue); 
            padding: 6px 15px; font-size: 0.75em; font-weight: bold; transition: 0.3s; 
        }
        .simco-btn:hover { background: var(--neon-blue); color: #000; }
        .logout-link { color: #444; text-decoration: none; font-size: 0.7em; }
        .logout-link:hover { color: var(--neon-pink); }

        .security-msg { 
            text-align: center; color: var(--neon-pink); font-weight: bold; 
            margin-bottom: 20px; border: 1px dashed var(--neon-pink); padding: 10px; font-size: 0.9em; 
        }
        .countdown-box { background: #111; padding: 15px; border-left: 5px solid var(--neon-pink); margin-bottom: 25px; text-align: center; }
        #timer { font-size: 2.2em; font-family: 'Share Tech Mono', monospace; color: var(--neon-pink); }
        
        .prediction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .predict-card { background: #0c0c0c; border: 1px solid #333; padding: 20px; border-radius: 4px; text-align: center; border-bottom: 3px solid var(--neon-blue); }
        .prob-value { font-size: 2.3em; font-weight: bold; color: var(--neon-blue); display: block; margin: 10px 0; }

        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #555; border-bottom: 2px solid #222; font-size: 0.8em; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #111; }
        .row-high-pct { color: var(--neon-blue); font-weight: bold; }

        .made-in { 
            margin-top: 50px; text-align: center; color: #333; font-weight: 800; 
            font-size: 1.5em; letter-spacing: 10px; border-top: 1px solid #111; padding-top: 20px; 
        }
    </style>
</head>
<body>

<div id="login-form">
    <h2 style="color: var(--neon-pink); letter-spacing: 5px; margin-bottom: 30px;">SAB LOGIN</h2>
    <div class="input-group">
        <label>E-POSTA (ad@sab.com)</label>
        <input type="email" id="u-email" placeholder="burhan@sab.com">
    </div>
    <div class="input-group">
        <label>ŞİFRE</label>
        <input type="password" id="u-pass" placeholder="******">
    </div>
    <button class="login-btn" onclick="login()">Sisteme Bağlan</button>
    <p id="err" style="color: #ff0055; font-size: 0.8em; margin-top: 15px; font-family: 'Share Tech Mono';"></p>
</div>

<div id="main-content">
    <div class="container">
        <div class="top-nav">
            <a href="https://simcotools.com/tr/realms/0/" target="_blank" class="simco-btn">
                [ SİMCOTOOLS CANLI VERİ ]
            </a>
            <a href="#" class="logout-link" onclick="logout()">[ SİSTEMDEN ÇIK ]</a>
        </div>

        <div class="security-msg">SAB ÖZEL STRATEJİ HATTI | 17 MART İHALESİ TAHMİN VERİLERİ</div>

        <div class="countdown-box">
            <div style="font-size: 0.7em; color: #888; letter-spacing: 2px;">SIRADAKİ İHALE (SALI 16:00) KALAN SÜRE</div>
            <div id="timer">00G 00S 00D 00S</div>
        </div>

        <h2 style="text-align: center; letter-spacing: 2px; color: #fff; font-size: 1.1em; text-transform: uppercase;">17 Mart İhalesinde Gelme İhtimali Yüksek Ürünler</h2>
        <div class="prediction-grid" id="prediction-cards"></div>

        <h2 style="text-align: center; letter-spacing: 2px; color: #fff; margin-top: 50px; font-size: 1.1em; text-transform: uppercase;">Tüm Ürünler ve Trafik Payı Verileri</h2>
        <table>
            <thead>
                <tr>
                    <th>ÜRÜN ADI</th>
                    <th>TRAFİK PAYI (%)</th>
                    <th>GEÇEN SÜ
