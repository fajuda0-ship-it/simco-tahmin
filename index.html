    <style>

        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .sidebar-title { font-size: 0.7em; color: #8b949e; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .nav-btn { padding: 15px; border-radius: 6px; border: 1px solid var(--border); background: #21262d; color: var(--text); cursor: pointer; font-weight: bold; text-align: left; transition: 0.2s; font-size: 0.9em; }
        .nav-btn:hover { background: #30363d; border-color: #8b949e; }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .tender-layout { display: flex; gap: 20px; height: 100%; }
        .tender-list-wrap { width: 400px; border-right: 1px solid var(--border); overflow-y: auto; padding-right: 15px; }
        .list-header { display: grid; grid-template-columns: 1fr 50px 85px; font-size: 0.7em; color: #8b949e; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 5px; }
        .item { padding: 10px; margin-bottom: 3px; cursor: pointer; border-radius: 4px; display: grid; grid-template-columns: 1fr 50px 85px; font-size: 0.82em; background: #1c2128; transition: 0.1s; }
        .item:hover { background: #2d333b; }
        .item.active { background: var(--accent); color: white; }
        .company-table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 10px; }
        .company-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: #8b949e; background: #161b22; position: sticky; top: 0; }
        .company-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .val-up { color: var(--up); font-family: 'Roboto Mono'; }
        .val-down { color: var(--down); font-family: 'Roboto Mono'; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
        .card { background: #161b22; border: 1px solid var(--border); padding: 15px; border-radius: 6px; }
        .ticker { background: #010409; height: 30px; border-top: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; }
        .ticker-inner { display: inline-block; padding-left: 100%; animation: scroll 60s linear infinite; white-space: nowrap; font-family: 'Roboto Mono'; font-size: 0.8em; color: #8b949e; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
