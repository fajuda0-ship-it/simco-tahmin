<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB | Stratejik Avcı v23</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --warn: #ff3e3e; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid var(--neon); padding: 30px; background: #111; border-radius: 15px; width: 450px; text-align: center; box-shadow: 0 0 30px rgba(0,255,65,0.2); }
        .robot-label { font-size: 1.4em; color: #00ffff; border: 1px solid #00ffff; padding: 5px 15px; margin-bottom: 20px; display: inline-block; }
        .price-display { font-size: 5.5em; font-weight: bold; color: white; margin: 10px 0; text-shadow: 0 0 20px var(--neon); }
        .analysis-box { margin-top: 20px; padding: 25px; border-radius: 10px; font-size: 1.4em; font-weight: bold; transition: 0.5s; border: 1px solid #333; }
        .normal { background: rgba(0, 255, 65, 0.05); color: var(--neon); }
        .alert { background: rgba(255, 62, 62, 0.5); color: white; border-color: var(--warn); animation: flash 0.6s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .stats { margin-top: 20px; font-size: 0.85em; color: #666; display: flex; justify-content: space-around; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="robot-label">ROBOTLAR: 10 (Q0)</div>
    <div id="price" class="price-display">...</div>
    <div id="status-box" class="analysis-box normal">VERİ ARANIYOR...</div>

    <div class="stats">
        <div>BAZ: <span id="base-p" style="color:#00ffff;">$800.00</span></div>
        <div>ALARM (%3): <span id="thresh-p" style="color:#ffcc00;">$824.00</span></div>
    </div>
    <div style="margin-top:15px; font-size:0.7em; color:#444;">SAB v23 / PROXY MODE</div>
</div>

<script>
    const BAZ_FIYAT = 800.00;
    const ESIK = 1.03;
    const TARGET = 'https://api.simcotools.com/v1/realms/0/market/prices';

    async function fetchData() {
        const priceEl = document.getElementById('price');
        const boxEl = document.getElementById('status-box');
        const limit = BAZ_FIYAT * ESIK;

        document.getElementById('base-p').innerText = "$" + BAZ_FIYAT.toFixed(2);
        document.getElementById('thresh-p').innerText = "$" + limit.toFixed(2);

        try {
            // Google Script yerine AllOrigins köprüsü kullanıyoruz
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(TARGET)}`);
            const raw = await response.json();
            const data = JSON.parse(raw.contents); // Veriyi temizle
            
            const robot = data.find(item => item.id === 102);

            if (robot) {
                const currentPrice = robot.price;
                priceEl.innerText = "$" + currentPrice.toFixed(2);

                if (currentPrice >= limit) {
                    boxEl.innerHTML = "🚨 FİYAT YÜKSEK: İHALE GELEBİLİR!";
                    boxEl.className = "analysis-box alert";
                } else {
                    boxEl.innerHTML = "✅ PİYASA SEYRİ NORMAL";
                    boxEl.className = "analysis-box normal";
                }
            }
        } catch (e) {
            boxEl.innerText = "YENİDEN DENENİYOR...";
        }
    }

    fetchData();
    setInterval(fetchData, 45000); // 45 saniyede bir kontrol
</script>
</body>
</html>
