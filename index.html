<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Strateji Paneli - Üye Girişi</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Giriş Formu Tasarımı */
        #login-form { width: 100%; max-width: 400px; background: #0a0a0a; border: 1px solid #222; padding: 40px; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,1); text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #888; margin-bottom: 5px; font-size: 0.8em; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; font-family: 'Share Tech Mono', monospace; box-sizing: border-box; }
        input:focus { border-color: var(--neon-blue); outline: none; }
        button { width: 100%; padding: 12px; background: var(--neon-blue); border: none; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #00b8dd; }

        /* Ana Panel (Girişten Sonra Gözükecek) */
        #main-content { display: none; width: 100%; max-width: 1100px; padding: 20px; }
        .container { background: rgba(10, 10, 10, 0.95); border: 1px solid #222; padding: 30px; }
        .timer-box { background: #111; padding: 15px; border-left: 5px solid var(--neon-pink); margin-bottom: 20px; text-align: center; color: var(--neon-pink); font-size: 2em; font-family: 'Share Tech Mono', monospace; }
        
        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #555; border-bottom: 2px solid #222; font-size: 0.85em; }
        td { padding: 15px; border-bottom: 1px solid #111; }
        .row-high-pct { color: var(--neon-blue); font-weight: bold; }
        .logout-btn { background: none; border: 1px solid #333; color: #555; width: auto; padding: 5px 15px; font-size: 0.7em; margin-top: 20px; }
        .logout-btn:hover { color: var(--neon-pink); border-color: var(--neon-pink); }
    </style>
</head>
<body>

<div id="login-form">
    <h2 style="color: var(--neon-pink); letter-spacing: 5px;">SAB LOGIN</h2>
    <div class="input-group">
        <label>STRATEJİ E-POSTA</label>
        <input type="email" id="email" placeholder="email@sab.com">
    </div>
    <div class="input-group">
        <label>GÜVENLİK ŞİFRESİ</label>
        <input type="password" id="pass" placeholder="******">
    </div>
    <button onclick="login()">SİSTEME GİRİŞ YAP</button>
    <p id="error-msg" style="color: red; font-size: 0.8em; margin-top: 10px;"></p>
</div>

<div id="main-content">
    <div class="container">
        <div style="text-align: right;"><button class="logout-btn" onclick="logout()">SİSTEMDEN ÇIK</button></div>
        <h3 style="color: var(--neon-pink); text-align: center;">SAB ÖZEL STRATEJİ VERİLERİ</h3>
        
        <div class="timer-box" id="timer">00G 00S 00D 00S</div>

        <table>
            <thead>
                <tr>
                    <th>ÜRÜN ADI</th>
                    <th>TRAFİK PAYI (%)</th>
                    <th>DURUM</th>
                </tr>
            </thead>
            <tbody id="main-table-body"></tbody>
        </table>
        <div style="margin-top: 40px; text-align: center; color: #333; font-weight: 800; font-size: 1.5em; letter-spacing: 10px;">MADE IN: SAB</div>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIGURATION (Senin Verilerin)
    const firebaseConfig = {
        apiKey: "AIzaSyBTplbpl4cP8ATDIWE9Vb_BogSxHjvc0BM",
        authDomain: "saboff.firebaseapp.com",
        projectId: "saboff",
        storageBucket: "saboff.firebasestorage.app",
        messagingSenderId: "281123108112",
        appId: "1:281123108112:web:a7fe2a95ba5a4c2d906195"
    };
    firebase.initializeApp(firebaseConfig);

    // 2. GİRİŞ KONTROL MEKANİZMASI
    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
            loadData(); // Verileri yükle
        } else {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }
    });

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        firebase.auth().signInWithEmailAndPassword(email, pass)
            .catch(e => document.getElementById('error-msg').innerText = "HATA: GİRİŞ REDDEDİLDİ.");
    }

    function logout() {
        firebase.auth().signOut();
    }

    // 3. TABLO VERİLERİ VE SAYAÇ
    function loadData() {
        const rawData = [
            {ad: "Robotlar", p: 12.4, last: "2026-03-04"},
            {ad: "E-Bileşenler", p: 9.1, last: "2026-03-04"},
            {ad: "Çelik", p: 7.8, last: "2025-11-05"},
            {ad: "Pil", p: 6.9, last: "2025-11-05"},
            {ad: "İşlemci", p: 5.5, last: "2025-12-31"},
            {ad: "Yazılım", p: 4.4, last: "2025-11-12"},
            {ad: "Samosa", p: 1.4, last: "2026-02-01"}
        ];

        const tbody = document.getElementById('main-table-body');
        tbody.innerHTML = "";
        const TODAY = new Date();

        rawData.sort((a,b) => b.p - a.p).forEach(item => {
            const diffDays = Math.floor((TODAY - new Date(item.last)) / (1000 * 60 * 60 * 24));
            tbody.innerHTML += `
                <tr>
                    <td><b>${item.ad}</b></td>
                    <td class="row-high-pct">%${item.p}</td>
                    <td style="font-size: 0.85em;">${diffDays} GÜN ÖNCE</td>
                </tr>
            `;
        });
    }

    // 4. SALI 16:00 SAYACI
    function updateTimer() {
        const now = new Date();
        let target = new Date();
        target.setDate(now.getDate() + (2 + 7 - now.getDay()) % 7);
        target.setHours(16, 0, 0, 0);
        if (now > target) target.setDate(target.getDate() + 7);
        const d = target - now;
        const days = Math.floor(d / 86400000);
        const hrs = Math.floor((d % 86400000) / 3600000);
        const mins = Math.floor((d % 3600000) / 60000);
        const secs = Math.floor((d % 60000) / 1000);
        const timerElem = document.getElementById('timer');
        if(timerElem) timerElem.innerText = `${days}G ${String(hrs).padStart(2, '0')}S ${String(mins).padStart(2, '0')}D ${String(secs).padStart(2, '0')}S`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
