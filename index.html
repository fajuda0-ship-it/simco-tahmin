<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB CORE v26.5 // ANALYTICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #2f81f7; --text: #c9d1d9; --hot: #f85149; --warm: #d29922; --cold: #3fb950; }
        body { background: var(--bg); color: var(--text); font-family: 'Roboto Mono', monospace; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 15px; border-radius: 6px; }
        .heat-bar { height: 4px; width: 100%; background: #30363d; margin: 10px 0; border-radius: 2px; overflow: hidden; }
        .heat-fill { height: 100%; transition: 0.5s; }
        .status { font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; font-size: 0.8em; }
        th { text-align: left; color: #8b949e; border-bottom: 1px solid #30363d; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #21262d; }
    </style>
</head>
<body>

    <h2>İHALE SICAKLIK ANALİZİ (18 MART TAHMİNİ)</h2>
    <div class="grid" id="main-grid"></div>

    <script>
        const TODAY = new Date("2026-03-16");
        
        // Periyotlar senin listendeki gerçek aralıklardır
        const data = [
            { ad: "İleri Robotik", cat: "Elektronik", last: "2026-03-04", avg: 18, items: "Robot, E-Bileşen" },
            { ad: "E-öğrenme Cihazları", cat: "Elektronik", last: "2026-02-18", avg: 24, items: "Tablet, Ekran" },
            { ad: "Nükleer Santral", cat: "Ağır Sanayi", last: "2026-01-21", avg: 35, items: "Çelik, Beton" },
            { ad: "Yıldız Gemisi", cat: "Uzay", last: "2026-01-28", avg: 42, items: "Gemisi, Yakıt" },
            { ad: "Değerli Metaller", cat: "Hammadde", last: "2026-03-12", avg: 28, items: "Altın, Cevher" },
            { ad: "Hammadde Çıkarımı", cat: "Hammadde", last: "2025-06-18", avg: 35, items: "Boksit, Silikon" }
        ];

        function render() {
            const container = document.getElementById('main-grid');
            container.innerHTML = data.map(p => {
                const diff = Math.floor((TODAY - new Date(p.last)) / (1000*60*60*24));
                const ratio = Math.min(100, (diff / p.avg) * 100);
                let color = "var(--cold)";
                let status = "Beklemede";
                
                if(ratio > 80) { color = "var(--hot)"; status = "KRİTİK (Sıcak)"; }
                else if(ratio > 50) { color = "var(--warm)"; status = "Takipte (Ilık)"; }

                return `
                    <div class="card">
                        <div class="status" style="color:${color}">${status}</div>
                        <div style="font-size: 1.1em; margin: 5px 0;">${p.ad}</div>
                        <div style="font-size: 0.7em; color:#8b949e">${p.cat} // ${p.items}</div>
                        <div class="heat-bar"><div class="heat-fill" style="width:${ratio}%; background:${color}"></div></div>
                        <div style="font-size: 0.7em;">Son ihaleden beri: ${diff} gün (Ort: ${p.avg} gün)</div>
                    </div>
                `;
            }).join('');
        }
        render();
    </script>
</body>
</html>
