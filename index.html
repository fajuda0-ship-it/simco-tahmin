<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB CORE - TENDER PREDICTOR v24.1</title>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #050505; --warning: #ff3e3e; --alert: #ffab00; }
        body { background-color: var(--bg-black); color: var(--neon-green); font-family: 'Courier New', Courier, monospace; padding: 20px; text-transform: uppercase; }
        .terminal-border { border: 2px solid var(--neon-green); padding: 15px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        h1 { border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; font-size: 1.5rem; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid rgba(0, 255, 65, 0.3); padding: 8px; text-align: left; }
        th { background: rgba(0, 255, 65, 0.1); }
        .critical { color: var(--warning); font-weight: bold; animation: blink 1.5s infinite; }
        .warning { color: var(--alert); }
        .safe { color: #555; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal-border">
    <div class="status-bar">
        <span>SAB CORE TERMINAL v24.1</span>
        <span id="current-date">SİSTEM TARİHİ: 16 MART 2026</span>
    </div>
    <h1>İHALE DÖNGÜ VE TAHMİN ANALİZİ</h1>

    <table id="tenderTable">
        <thead>
            <tr>
                <th>PROJE İSMİ</th>
                <th>İÇERİK (RESOURCES)</th>
                <th>DÖNGÜ</th>
                <th>GEÇEN GÜN</th>
                <th>DURUM / TAHMİN</th>
            </tr>
        </thead>
        <tbody id="tenderBody">
            </tbody>
    </table>
</div>

<script>
const SYSTEM_DATE = new Date("2026-03-16");

// Tüm verileri buraya işledim
const tenderData = [
    { name: "İleri Robotik", items: "E-Bileşen, Robot, Yüksek Bilgisayar", cycle: 21, lastSeen: "2026-03-04" },
    { name: "Yıldız Gemisi Geliştirme", items: "Yıldız Gemisi, Roket Yakıtı", cycle: 42, lastSeen: "2026-01-28" },
    { name: "E-öğrenme Cihazları", items: "Tablet, Dizüstü, Ekran", cycle: 28, lastSeen: "2026-02-18" },
    { name: "Okul Öğle Yemeği Malz.", items: "Kakao, Hamur, Şeker, Sos", cycle: 21, lastSeen: "2026-02-25" },
    { name: "Nükleer Santral", items: "Çelik, Beton, Kimyasal", cycle: 49, lastSeen: "2026-01-21" },
    { name: "Meat Supply", items: "Sosis, Biftek", cycle: 35, lastSeen: "2026-02-04" },
    { name: "Drone Flosu", items: "Quadcopter, Pil, E-Bileşen", cycle: 21, lastSeen: "2026-02-11" },
    { name: "Navigasyon Takımyıldızı", items: "Roket Yakıtı, Uydu", cycle: 35, lastSeen: "2026-03-11" },
    { name: "Hava Kalitesi İzleme", items: "Kimyasal, Akıllı Telefon, Ekran", cycle: 28, lastSeen: "2025-12-10" },
    { name: "Çevreci Binalar", items: "Çelik Kiriş, Pencere", cycle: 203, lastSeen: "2026-02-18" },
    { name: "Akıllı Yollar", items: "Monitör, Araştırma, Telefon", cycle: 91, lastSeen: "2026-03-04" }
    // Diğer tüm ihaleler bu formatta eklenebilir
];

function renderTable() {
    const tbody = document.getElementById('tenderBody');
    
    // Verileri alfabetik sırala
    tenderData.sort((a, b) => a.name.localeCompare(b.name));

    tenderData.forEach(tender => {
        const lastDate = new Date(tender.lastSeen);
        const diffTime = Math.abs(SYSTEM_DATE - lastDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const statusDiff = diffDays - tender.cycle;

        let statusText = "";
        let rowClass = "";

        if (statusDiff >= 0) {
            statusText = `GECİKTİ (+${statusDiff} GÜN)`;
            rowClass = "critical";
        } else if (Math.abs(statusDiff) <= 3) {
            statusText = "BEKLENİYOR (YAKIN)";
            rowClass = "warning";
        } else {
            statusText = `${Math.abs(statusDiff)} GÜN VAR`;
            rowClass = "safe";
        }

        const row = `
            <tr class="${rowClass}">
                <td>${tender.name}</td>
                <td style="font-size: 0.7rem;">${tender.items}</td>
                <td>${tender.cycle} G</td>
                <td>${diffDays} G</td>
                <td>${statusText}</td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

renderTable();
</script>

</body>
</html>
