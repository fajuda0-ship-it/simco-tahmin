<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: #34495e; padding: 25px; border-radius: 15px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bina-header { text-align: center; margin-bottom: 20px; }
        .bina-img { width: 120px; filter: drop-shadow(0 0 5px #fff); }
        
        select, input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; font-size: 16px; }
        
        .section { margin-top: 20px; padding: 15px; border-radius: 10px; }
        .yikim-box { border: 2px solid #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .yapim-box { border: 2px solid #2ecc71; background: rgba(46, 204, 113, 0.1); }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-yikim { background: #e74c3c; color: white; }
        .btn-yapim { background: #2ecc71; color: white; }
        button:hover { opacity: 0.8; }
        
        #sonuc-ekrani { margin-top: 20px; padding: 15px; background: #ecf0f1; color: #2c3e50; border-radius: 8px; font-weight: bold; text-align: center; min-height: 40px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="bina-header">
        <img src="image_f149ed.png" alt="Bina Görseli" class="bina-img">
        <h2>Bina Yönetimi</h2>
        
        <label>Bina Türü Seç:</label>
        <select id="bina-tipi">
            <option value="bakkal">Bakkal (Grocery Store)</option>
            <option value="fabrika">Fabrika (Factory)</option>
        </select>
    </div>

    <div class="section yikim-box">
        <h3 style="color:#e74c3c; margin-top:0;">Bina Yıkımı</h3>
        <label>Mevcut Seviye:</label>
        <input type="number" id="yikim-seviye" placeholder="Kaçıncı seviye?" min="1">
        <button class="btn-yikim" onclick="yikimHesapla()">Yıkım İadesini Gör</button>
    </div>

    <div class="section yapim-box">
        <h3 style="color:#2ecc71; margin-top:0;">Yapım / Geliştirme</h3>
        <label>Şu Anki Seviye:</label>
        <input type="number" id="yapim-mevcut" value="0" min="0">
        
        <label>Hedef Seviye:</label>
        <input type="number" id="yapim-hedef" placeholder="Hedef kaç?" min="1">
        <button class="btn-yapim" onclick="yapimHesapla()">İnşaat Giderini Gör</button>
    </div>

    <div id="sonuc-ekrani">İşlem bekleniyor...</div>
</div>

<script>
    function yikimHesapla() {
        const bina = document.getElementById('bina-tipi').value;
        const lvl = parseInt(document.getElementById('yikim-seviye').value);
        
        if(!lvl) { alert("Seviye girmelisin!"); return; }
        
        // Sim Companies: Yıkımda seviye başı sabit bir geri ödeme (temsili)
        let iade = (bina === "bakkal") ? lvl * 250 : lvl * 1000;
        document.getElementById('sonuc-ekrani').innerHTML = `${bina.toUpperCase()} için Seviye ${lvl} yıkım iadesi: $${iade}`;
    }

    function yapimHesapla() {
        const bina = document.getElementById('bina-tipi').value;
        const mevcut = parseInt(document.getElementById('yapim-mevcut').value);
        const hedef = parseInt(document.getElementById('yapim-hedef').value);
        
        if(!hedef || hedef <= mevcut) { 
            alert("Hedef seviye, mevcut seviyeden yüksek olmalı!"); 
            return; 
        }

        // Sim Companies: Seviye atladıkça maliyet katlanır (temsili formül)
        let toplamMaliyet = 0;
        let birimMaliyet = (bina === "bakkal") ? 500 : 2000;

        for(let i = mevcut + 1; i <= hedef; i++) {
            toplamMaliyet += (i * birimMaliyet);
        }

        document.getElementById('sonuc-ekrani').innerHTML = 
            `${bina.toUpperCase()} Seviye ${mevcut} → ${hedef} için gereken: $${toplamMaliyet}`;
    }
</script>

</body>
</html>
