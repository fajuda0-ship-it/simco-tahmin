<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB CORE - PRODUCT ANALYZER v25.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --warn: #ffab00; --crit: #ff3131; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { border: 1px solid var(--neon); padding: 15px; background: rgba(0,255,65,0.02); }
        h2 { border-bottom: 1px solid var(--neon); padding-bottom: 10px; font-size: 1.2rem; }
        .product-item { padding: 8px; cursor: pointer; border-bottom: 1px solid rgba(0,255,65,0.2); display: flex; justify-content: space-between; }
        .product-item:hover { background: rgba(0,255,65,0.1); }
        .detail-card { border: 1px dashed var(--neon); padding: 15px; margin-top: 10px; display: none; }
        .tag { font-size: 0.7rem; padding: 2px 5px; border-radius: 3px; margin-left: 5px; }
        .tag-crit { background: var(--crit); color: white; }
        .tag-ok { border: 1px solid var(--neon); }
    </style>
</head>
<body>

<h1>SAB CORE - ÜRÜN BAZLI İHALE ANALİZÖRÜ</h1>
<div style="margin-bottom: 20px;">SİSTEM TARİHİ: 16 MART 2026</div>

<div class="grid">
    <div class="panel">
        <h2>TÜM ÜRÜNLER (Gecikmeye Göre)</h2>
        <div id="productList"></div>
    </div>

    <div class="panel">
        <h2>ÜRÜN DETAYLI TAHMİNİ</h2>
        <div id="noSelection">Bir ürüne tıklayarak döngü detaylarını gör.</div>
        <div id="detailView" class="detail-card">
            <h3 id="selectedProductName" style="color: var(--warn);">---</h3>
            <p>Bu ürünün geçtiği tüm aktif döngüler:</p>
            <div id="projectBreakdown"></div>
        </div>
    </div>
</div>

<script>
const SYSTEM_DATE = new Date("2026-03-16");

// Veritabanını buraya bağladım (Önceki büyük listeyi kullanır)
const tenderData = [
    { name: "İleri Robotik", items: ["E-Bileşen", "Robotlar", "Yüksek Seviye E-Bilgisayar"], cycle: 21, lastSeen: "2026-03-04" },
    { name: "Mars Gezgini", items: ["Pil", "Havacılık Araştırması", "Robotlar"], cycle: 45, lastSeen: "2025-11-19" },
    { name: "Yıldız Gemisi Geliştirme", items: ["Yıldız Gemisi", "Roket Yakıtı"], cycle: 42, lastSeen: "2026-01-28" },
    { name: "Nükleer Santral", items: ["Çelik", "Betonarme Blok", "Kimyasal"], cycle: 49, lastSeen: "2026-01-21" },
    { name: "Metro Altyapısı", items: ["Betonarme Blok", "İnşaat Gereci", "Çelik Kiriş"], cycle: 105, lastSeen: "2025-11-26" },
    { name: "Üretim Desteği", items: ["Demir Cevheri", "Çelik"], cycle: 42, lastSeen: "2025-12-10" }
    // ...Buraya tüm listeyi ekleyebilirsin
];

// 1. Ürünleri tekilleştir ve analiz et
function analyzeProducts() {
    const products = {};

    tenderData.forEach(tender => {
        tender.items.forEach(item => {
            if (!products[item]) {
                products[item] = { 
                    name: item, 
                    lastOverallSeen: new Date("2000-01-01"), 
                    projects: [] 
                };
            }
            
            const lastSeenDate = new Date(tender.lastSeen);
            if (lastSeenDate > products[item].lastOverallSeen) {
                products[item].lastOverallSeen = lastSeenDate;
            }

            products[item].projects.push({
                projectName: tender.name,
                cycle: tender.cycle,
                lastSeen: tender.lastSeen
            });
        });
    });

    return Object.values(products).sort((a, b) => a.lastOverallSeen - b.lastOverallSeen);
}

const analyzedData = analyzeProducts();

function renderProducts() {
    const listDiv = document.getElementById('productList');
    analyzedData.forEach(prod => {
        const diff = Math.ceil((SYSTEM_DATE - prod.lastOverallSeen) / (1000*60*60*24));
        const itemDiv = document.createElement('div');
        itemDiv.className = 'product-item';
        itemDiv.innerHTML = `<span>${prod.name}</span> <span>${diff} GÜNDÜR YOK</span>`;
        itemDiv.onclick = () => showDetail(prod);
        listDiv.appendChild(itemDiv);
    });
}

function showDetail(product) {
    document.getElementById('noSelection').style.display = 'none';
    const detailView = document.getElementById('detailView');
    detailView.style.display = 'block';
    
    document.getElementById('selectedProductName').innerText = product.name;
    const breakdown = document.getElementById('projectBreakdown');
    breakdown.innerHTML = "";

    product.projects.forEach(p => {
        const last = new Date(p.lastSeen);
        const passed = Math.ceil((SYSTEM_DATE - last) / (1000*60*60*24));
        const remaining = p.cycle - passed;
        
        const statusClass = remaining <= 0 ? "tag-crit" : "tag-ok";
        const statusText = remaining <= 0 ? `GECİKTİ (+${Math.abs(remaining)})` : `${remaining} GÜN KALDI`;

        breakdown.innerHTML += `
            <div style="margin-bottom:10px; border-left: 2px solid var(--neon); padding-left: 10px;">
                <strong>${p.projectName}</strong><br>
                Döngü: ${p.cycle} G | Son: ${p.lastSeen} 
                <span class="tag ${statusClass}">${statusText}</span>
            </div>
        `;
    });
}

renderProducts();
</script>
</body>
</html>
