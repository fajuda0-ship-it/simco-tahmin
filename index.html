<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Strateji & İhale Paneli</title>
    <style>
        body { background-color: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { max-width: 1000px; width: 100%; background: #0a0a0a; border: 2px solid #ff00ff; border-radius: 15px; padding: 40px; box-shadow: 0 0 30px rgba(255, 0, 255, 0.2); text-align: center; }
        
        .security-alert { background: #ff00ff; color: #000; padding: 15px; font-weight: bold; border-radius: 5px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Canlı Fiyat Kutusu */
        .live-market { background: #111; border: 1px solid #00ffcc; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .price-value { font-size: 3.5em; font-weight: 900; color: #fff; text-shadow: 0 0 15px #00ffcc; margin: 10px 0; }
        .price-label { color: #00ffcc; text-transform: uppercase; font-size: 0.9em; letter-spacing: 2px; }

        h1 { color: #fff; text-transform: uppercase; letter-spacing: 5px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: #ff00ff; border-bottom: 2px solid #333; text-transform: uppercase; font-size: 0.85em; }
        td { padding: 15px; border-bottom: 1px solid #222; text-align: left; }
        
        .product-name { font-weight: bold; color: #fff; }
        .last-seen { color: #ffcc00; font-family: 'Courier New', monospace; font-weight: bold; }
        .q-tag { color: #ff00ff; font-weight: bold; font-size: 0.9em; }
        
        .footer { margin-top: 40px; color: #444; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="security-alert">
            DİKKAT: BU VERİLER YALNIZCA STRATEJİ ATILIM BİRLİĞİ ÜYELERİNE KULLANIMA AÇIKTIR
        </div>

        <div class="live-market">
            <span class="price-label">Robot (114) Güncel Market Fiyatı</span>
            <div id="live-price" class="price-value">...</div>
            <span id="update-status" style="font-size: 0.7em; color: #555;">Veri senkronize ediliyor...</span>
        </div>

        <h1>İHALE KRONOLOJİK ANALİZİ</h1>

        <table>
            <thead>
                <tr>
                    <th>ÜRÜN ADI</th>
                    <th>TRAFİK PAYI (%)</th>
                    <th>KALİTE (Q1+)</th>
                    <th>SON GÖRÜLDÜĞÜ TARİH</th>
                </tr>
            </thead>
            <tbody id="data-table">
                </tbody>
        </table>

        <div class="footer">SAB v2.8 - LIVE DATA & CHRONO ENGINE</div>
    </div>

    <script>
        // 1. Canlı Fiyat Çekme Fonksiyonu
        async function fetchSimcoPrice() {
            const statusEl = document.getElementById('update-status');
            const priceEl = document.getElementById('live-price');
            
            try {
                // AllOrigins Proxy üzerinden Simcotools'a erişim
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://simcotools.com/tr/market/0/24')}`);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // Senin yakaladığın o meşhur seçici
                const element = doc.querySelector('span.text-4xl.font-black');
                
                if (element) {
                    priceEl.innerText = "$" + element.innerText;
                    statusEl.innerText = "Veri Simcotools üzerinden anlık doğrulandı.";
                } else {
                    priceEl.innerText = "$690"; // Hata durumunda senin yakaladığın son fiyatı gösterir
                    statusEl.innerText = "Canlı veri okuma hatası (Manuel moda geçildi).";
                }
            } catch (err) {
                priceEl.innerText = "$690";
                statusEl.innerText = "Bağlantı hatası: Kayıtlı veri gösteriliyor.";
            }
        }

        // 2. İhale Tablo Verileri
        const analysis = [
            {ad: "Robotlar", p: 11.8, q: 28, last: "6 Mar 2026 Cum"},
            {ad: "Elektronik Bileşenler", p: 8.5, q: 22, last: "6 Mar 2026 Cum"},
            {ad: "Çelik", p: 7.2, q: 15, last: "5 Mar 2026 Per"},
            {ad: "Pil", p: 6.4, q: 19, last: "6 Mar 2026 Cum"},
            {ad: "Roket Yakıtı", p: 5.9, q: 10, last: "5 Mar 2026 Per"},
            {ad: "Yazılım", p: 4.7, q: 35, last: "4 Mar 2026 Çar"},
            {ad: "İşlemci", p: 4.3, q: 31, last: "6 Mar 2026 Cum"},
            {ad: "İnşaat Gereci", p: 4.1, q: 12, last: "4 Mar 2026 Çar"},
            {ad: "Ekranlar", p: 3.8, q: 18, last: "3 Mar 2026 Sal"},
            {ad: "Tabletler", p: 3.5, q: 25, last: "5 Mar 2026 Per"},
            {ad: "Yıldız Gemisi", p: 3.3, q: 40, last: "3 Mar 2026 Sal"},
            {ad: "Dizüstü", p: 3.1, q: 27, last: "6 Mar 2026 Cum"},
            {ad: "Malzeme Araştırması", p: 1.8, q: 0, last: "4 Mar 2026 Çar"},
            {ad: "Akıllı Telefonlar", p: 1.6, q: 12, last: "4 Mar 2026 Çar"}
        ];

        const tbody = document.getElementById('data-table');
        analysis.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="product-name">${item.ad}</td>
                <td>%${item.p}</td>
                <td class="q-tag">%${item.q}</td>
                <td class="last-seen">${item.last}</td>
            `;
            tbody.appendChild(row);
        });

        // Başlangıçta fiyatı çek
        fetchSimcoPrice();
        // Her 5 dakikada bir güncelle
        setInterval(fetchSimcoPrice, 300000);
    </script>
</body>
</html>
