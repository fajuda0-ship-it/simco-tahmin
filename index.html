<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Fiyat Takip</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            background-color: #ffffff;
        }
        #price { 
            font-size: 180px; 
            font-weight: bold; 
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div id="price">YÜKLENİYOR...</div>

    <script>
        async function updatePrice() {
            try {
                // Senin en son verdiğin güncel Google Script linki
                const url = 'https://script.google.com/macros/s/AKfycbxuJQoPZ2sI-aIqzp6fbkIZY5Azokl-DXMqu_5OUVoNdzNwy2jli_MAbP6d7w8uCKQt/exec';
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.price !== undefined) {
                    // Rakamı bulduysak ekrana bas
                    document.getElementById('price').innerText = "$" + data.price;
                } else {
                    document.getElementById('price').innerText = "VERI YOK";
                }
            } catch (e) {
                document.getElementById('price').innerText = "BAGLANTI HATASI";
                console.error("Hata:", e);
            }
        }

        // Sayfa açılır açılmaz çalıştır
        updatePrice();
        
        // 30 saniyede bir otomatik tazele
        setInterval(updatePrice, 30000);
    </script>
</body>
</html>
