<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Fiyat Takip</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background-color: white; 
        }
        #price { 
            font-size: 150px; 
            font-weight: bold; 
            color: black; 
        }
    </style>
</head>
<body>

    <div id="price">...</div>

    <script>
        async function updatePrice() {
            try {
                // Senin sitenin tam API adresi burası
                const response = await fetch('https://simco-tahmin.vercel.app/api/price');
                const data = await response.json();
                
                if (data.price !== undefined) {
                    document.getElementById('price').innerText = "$" + data.price;
                } else {
                    document.getElementById('price').innerText = "VERİ YOK";
                }
            } catch (e) {
                document.getElementById('price').innerText = "HATA";
                console.error("Hata detayı:", e);
            }
        }

        // Sayfa açılınca çalıştır
        updatePrice();
        
        // 30 saniyede bir güncelle
        setInterval(updatePrice, 30000);
    </script>
</body>
</html>
