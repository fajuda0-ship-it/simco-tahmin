<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sim Companies Bina Yükseltme Hesaplayıcı</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #34495e; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .result { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; border-radius: 4px; }
        .result p { margin: 5px 0; font-size: 15px; }
        .total-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 5px 0; }
        .unit { font-weight: bold; color: #2980b9; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏗️ Bina Yükseltme</h2>
    
    <label for="binaSec">Bina Türü:</label>
    <select id="binaSec" onchange="hesapla()">
        <option value="bakkal">Bakkal (Grocery Store)</option>
        <option value="fabrika">Fabrika (Factory)</option>
    </select>

    <label for="mevcutLvl">Mevcut Seviye:</label>
    <input type="number" id="mevcutLvl" value="1" min="1" oninput="hesapla()">

    <label for="hedefLvl">Hedef Seviye:</label>
    <input type="number" id="hedefLvl" value="2" min="2" oninput="hesapla()">

    <div class="result" id="sonuc">
        <strong>Gereken Toplam Malzemeler:</strong>
        <div id="liste"></div>
    </div>
    
    <p style="font-size: 12px; color: #7f8c8d; margin-top: 15px; text-align: center;">
        *Formül: Seviye Başına Malzeme = (Mevcut Seviye) × (Temel Birim)
    </p>
</div>

<script>
    // Temel Birim Verileri
    const binalar = {
        bakkal: { beton: 12, tugla: 165, kereste: 48, arac: 3 },
        fabrika: { beton: 56, tugla: 770, kereste: 224, arac: 14 }
    };

    function hesapla() {
        const bina = document.getElementById('binaSec').value;
        const mevcut = parseInt(document.getElementById('mevcutLvl').value);
        const hedef = parseInt(document.getElementById('hedefLvl').value);
        const listeDiv = document.getElementById('liste');
        
        if (hedef <= mevcut) {
            listeDiv.innerHTML = "<p style='color:red;'>Hedef seviye mevcut seviyeden büyük olmalıdır!</p>";
            return;
        }

        let toplamBeton = 0;
        let toplamTugla = 0;
        let toplamKereste = 0;
        let toplamArac = 0;

        const temel = binalar[bina];

        // Seviyeleri tek tek toplayarak git (Örn: 1->3 için 1. seviye ve 2. seviye maliyetleri toplanır)
        for (let i = mevcut; i < hedef; i++) {
            toplamBeton += i * temel.beton;
            toplamTugla += i * temel.tugla;
            toplamKereste += i * temel.kereste;
            toplamArac += i * temel.arac;
        }

        listeDiv.innerHTML = `
            <div class="total-row"><span>Betonarme Blok:</span> <span class="unit">${toplamBeton}</span></div>
            <div class="total-row"><span>Tuğla:</span> <span class="unit">${toplamTugla}</span></div>
            <div class="total-row"><span>Kereste:</span> <span class="unit">${toplamKereste}</span></div>
            <div class="total-row"><span>İnşaat Gereci:</span> <span class="unit">${toplamArac}</span></div>
        `;
    }

    // İlk açılışta hesapla
    hesapla();
</script>

</body>
</html>
