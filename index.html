<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Strateji Merkezi</title>
    <style>
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            max-width: 1000px;
            width: 100%;
            background: rgba(10, 10, 10, 0.98);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.2);
            text-align: center;
        }

        .security-alert {
            background: #ff00ff;
            color: #000;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 5px;
            margin-bottom: 30px;
            text-transform: uppercase;
            box-shadow: 0 0 20px #ff00ff;
            letter-spacing: 1px;
        }

        h1 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 15px;
            color: #ff00ff;
            border-bottom: 2px solid #333;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
            vertical-align: middle;
        }

        .product-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #fff;
        }

        .stat-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-bg {
            background: #1a1a1a;
            height: 10px;
            flex-grow: 1;
            border-radius: 5px;
            overflow: hidden;
            max-width: 100px;
        }

        .bar-fill {
            height: 100%;
            background: #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
        }

        .q-tag {
            background: #222;
            color: #ff00ff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            border: 1px solid #ff00ff;
            white-space: nowrap;
        }

        .last-seen {
            color: #888;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .footer {
            margin-top: 40px;
            color: #444;
            font-size: 0.8em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="security-alert">
            DİKKAT: BU VERİLER YALNIZCA STRATEJİ ATILIM BİRLİĞİ ÜYELERİNE KULLANIMA AÇIKTIR
        </div>

        <h1>İHALE STRATEJİ ANALİZİ</h1>

        <table>
            <thead>
                <tr>
                    <th>ÜRÜN ADI</th>
                    <th>TRAFİK PAYI</th>
                    <th>Q1+ ORANI</th>
                    <th>SON GÖRÜLME TARİHİ</th>
                </tr>
            </thead>
            <tbody id="data-table">
                </tbody>
        </table>

        <div class="footer">
            SAB v2.5 - ZAMANSAL VERİ TAKİBİ ETKİN
        </div>
    </div>

    <script>
        const analysis = [
            {ad: "Robotlar", p: 11.8, q: 28, last: "09.03.2026 08:45"},
            {ad: "Elektronik Bileşenler", p: 8.5, q: 22, last: "09.03.2026 08:15"},
            {ad: "Çelik", p: 7.2, q: 15, last: "08.03.2026 22:30"},
            {ad: "Pil", p: 6.4, q: 19, last: "09.03.2026 07:50"},
            {ad: "Roket Yakıtı", p: 5.9, q: 10, last: "09.03.2026 09:12"},
            {ad: "Yazılım", p: 4.7, q: 35, last: "08.03.2026 19:40"},
            {ad: "İşlemci", p: 4.3, q: 31, last: "09.03.2026 06:20"},
            {ad: "İnşaat Gereci", p: 4.1, q: 12, last: "08.03.2026 15:00"},
            {ad: "Yıldız Gemisi", p: 3.3, q: 40, last: "07.03.2026 12:10"},
            {ad: "Tabletler", p: 3.5, q: 25, last: "09.03.2026 04:30"},
            {ad: "Dizüstü", p: 3.1, q: 27, last: "09.03.2026 01:15"}
        ];

        const tbody = document.getElementById('data-table');

        analysis.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="product-name">${item.ad}</td>
                <td>
                    <div class="stat-box">
                        <span style="min-width: 45px;">%${item.p}</span>
                        <div class="bar-bg"><div class="bar-fill" style="width: ${item.p * 4}%"></div></div>
                    </div>
                </td>
                <td>
                    <span class="q-tag">Q1+ : %${item.q}</span>
                </td>
                <td class="last-seen">${item.last}</td>
            `;
            tbody.appendChild(row);
        });
    </script>
</body>
</html>
