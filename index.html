<div class="building-selection">
    <img src="image_f149ed.png" alt="Bina İkonu" id="building-img" width="100">
    <select id="building-select">
        <option value="inşaat-birimi">İnşaat Birimi</option>
        <option value="elektrik-santrali">Elektrik Santrali</option>
        </select>
</div>

<hr>

<div class="action-section" id="demolition-section">
    <h3>Bina Yıkımı</h3>
    <label>Mevcut Seviye:</label>
    <input type="number" id="demo-current-lvl" min="1" placeholder="Örn: 5">
    <button onclick="calculateDemolition()">Yıkım Maliyetini Hesapla</button>
</div>

<hr>

<div class="action-section" id="construction-section">
    <h3>Bina Yapımı / Geliştirme</h3>
    <label>Mevcut Seviye:</label>
    <input type="number" id="const-current-lvl" min="0" value="0">
    
    <label>Hedef Seviye:</label>
    <input type="number" id="const-target-lvl" min="1" placeholder="Örn: 10">
    
    <button onclick="calculateConstruction()">Yapım Maliyetini Hesapla</button>
</div>

<div id="result-display">
    </div>
