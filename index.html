<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Canlı Borsa Terminali</title>
    <style>
        :root { --neon-green: #00ffcc; --neon-pink: #ff00ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Consolas', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        
        .security-header { background: var(--neon-pink); color: black; font-weight: 900; text-align: center; padding: 10px; margin-bottom: 20px; box-shadow: 0 0 20px var(--neon-pink); text-transform: uppercase; }

        /* Borsa Kartları Konteynırı */
        .terminal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }

        .market-card { background: #0f0f0f; border: 1px solid #333; border-radius: 10px; padding: 20px; position: relative; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .market-card:hover { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }

        .asset-name { color: #888; font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; }
        .live-price { font-size: 3.5em; font-weight: 900; margin: 10px 0; color: #fff; }
        .live-price.update-flash { animation: flash-green 0.5s ease; }
        
        @keyframes flash-green { 0% { color: var(--neon-green); transform: scale(1.05); } 100% { color: white; transform: scale(1); } }

        .status-dot { height: 8px; width: 8px; background: var(--neon-green); border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* İhale İstatistik Tablosu (Modernize edilmiş) */
        .stats-section { background: #0f0f0f; border-radius: 10px; padding: 20px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th { text-align: left; color: var(--neon-pink); padding: 12px; border-bottom: 2px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #1a1a1a; }
        .trend-up { color: var(--neon-green); font-weight: bold; }
    </style>
</head>
<body>

    <div class="security-header">
        STRATEJİ ATILIM BİRLİĞİ - CANLI MARKET VERİ AKIŞI (RESTRICTED ACCESS)
    </div>

    <div class="terminal-grid">
        <div class="market-card">
            <div class="asset-name"><span class="status-dot"></span>Akıllı Telefonlar</div>
            <div id="price-phone" class="live-price">496</div>
            <div style="color: var(--neon-green); font-size: 0.9em;">Canlı Takip (XPath: span.text-4xl)</div>
        </div>

        <div class="market-card">
            <div class="asset-name"><span class="status-dot"></span>Robotlar (114)</div>
            <div id="price-robot" class="live-price">690</div>
            <div style="color: var(--neon-pink); font-size: 0.9em;">İhale Önceliği: YÜKSEK</div>
        </div>
    </div>

    <div class="stats-section">
        <h3 style="margin-top:0; color:var(--neon-green)">İHALE TRAFİK ANALİZİ (V3.0)</h3>
        <table>
            <thead>
                <tr>
                    <th>ÜRÜN</th>
                    <th>PAY (%)</th>
                    <th>KALİTE Q1+</th>
                    <th>SON İHALE TARİHİ</th>
                </tr>
            </thead>
            <tbody id="stats-body">
                </tbody>
        </table>
    </div>

    <script>
        // Simcotools'tan canlı veri çekme simülasyonu ve XPath Mantığı
        async function fetchMarketData(id, elementId) {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://simcotools.com/tr/market/0/${id}`);
            
            try {
                const response = await fetch(proxy + target);
                const data = await response.json();
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // Senin paylaştığın span sınıfı: text-4xl font-black
                const priceElement = doc.querySelector('.text-4xl.font-black');
                
                if (priceElement) {
                    const newPrice = priceElement.innerText;
                    const el = document.getElementById(elementId);
                    if (el.innerText !== newPrice) {
                        el.innerText = newPrice;
                        el.classList.add('update-flash');
                        setTimeout(() => el.classList.remove('update-flash'), 500);
                    }
                }
            } catch (e) { console.log("Veri çekme hatası: " + id); }
        }

        // İhale Verileri (Hiyerarşik ve Tarihsel)
        const ihaleVerileri = [
            {ad: "Robotlar", p: 11.8, q: 28, last: "6 Mar 2026 Cum"},
            {ad: "Elektronik Bil.", p: 8.5, q: 22, last: "6 Mar 2026 Cum"},
            {ad: "Çelik", p: 7.2, q: 15, last: "5 Mar 2026 Per"},
            {ad: "Pil", p: 6.4, q: 19, last: "6 Mar 2026 Cum"},
            {ad: "Akıllı Telefonlar", p: 1.6, q: 12, last: "4 Mar 2026 Çar"}
        ];

        const tbody = document.getElementById('stats-body');
        ihaleVerileri.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.ad}</td>
                    <td class="trend-up">%${item.p}</td>
                    <td>%${item.q}</td>
                    <td style="color: #ffcc00">${item.last}</td>
                </tr>
            `;
        });

        // Canlı Güncelleme Döngüleri
        function startSync() {
            fetchMarketData('24', 'price-robot'); // Robotlar
            fetchMarketData('40', 'price-phone'); // Akıllı Telefonlar (ID temsilidir)
        }

        setInterval(startSync, 15000); // 15 saniyede bir kontrol et
        startSync();
    </script>
</body>
</html>
