<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB | Robot Terminal v15</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
        .terminal { border: 2px solid var(--neon); padding: 35px; background: #111; box-shadow: 0 0 30px rgba(0,255,65,0.4); border-radius: 15px; width: 420px; text-align: center; }
        .robot-count { font-size: 1.2em; color: #00ffff; margin-bottom: 10px; border: 1px solid #00ffff; display: inline-block; padding: 5px 15px; border-radius: 5px; }
        .price-value { font-size: 5em; font-weight: bold; color: white; text-shadow: 0 0 20px var(--neon); margin: 15px 0; }
        .prediction { margin-top: 20px; font-size: 1.6em; color: #ffcc00; font-weight: bold; border-top: 1px solid #333; padding-top: 20px; }
        .footer { margin-top: 30px; font-size: 0.9em; color: #008f11; letter-spacing: 3px; font-weight: bold; border-top: 1px dashed #444; padding-top: 15px; width: 100%; }
        .status { font-size: 0.75em; margin-top: 10px; color: #666; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="robot-count">ROBOTLAR: 10</div>
    <div id="price" class="price-value">...</div>
    <div id="prediction" class="prediction">VERİ ARANIYOR</div>
    <div class="status">
        <span class="blink" style="color:red">●</span> 
        <span id="log">SAB v15 Başlatılıyor...</span>
    </div>
    <div class="footer">SAB TARAFINDAN GELİŞTİRİLİR</div>
</div>

<script>
    const target = 'https://api.simcotools.com/v1/realms/0/market/prices';
    // Dünyanın en hızlı 3 proxy kanalı
    const proxies = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
        `https://api.codetabs.com/v1/proxy?quest=${target}`,
        `https://corsproxy.io/?${encodeURIComponent(target)}`
    ];

    async function tryFetch(index = 0) {
        const priceEl = document.getElementById('price');
        const logEl = document.getElementById('log');
        const predEl = document.getElementById('prediction');

        if (index >= proxies.length) {
            logEl.innerText = "TÜM KANALLAR MEŞGUL, 10sn SONRA TEKRAR...";
            setTimeout(() => tryFetch(0), 10000);
            return;
        }

        try {
            logEl.innerText = `Kanal ${index + 1} üzerinden çekiliyor...`;
            const response = await fetch(proxies[index]);
            const raw = await response.json();
            
            // Veri yapısı AllOrigins için "contents", diğerleri için direkt kendisidir
            const data = raw.contents ? JSON.parse(raw.contents) : raw;
            const robot = data.find(item => item.id === 102);

            if (robot) {
                const p = robot.price;
                priceEl.innerText = "$" + p.toFixed(2);
                logEl.innerText = "BAĞLANTI BAŞARILI | " + new Date().toLocaleTimeString();
                
                if (p < 614) {
                    predEl.innerHTML = "🚨 <span style='color:red'>İHALE GELİYOR!</span>";
                } else if (p < 627) {
                    predEl.innerText = "⚠️ TAHMİN: HAZIR OL";
                } else {
                    predEl.innerText = "✅ BORSA SAKİN";
                }
            }
        } catch (e) {
            console.warn(`Kanal ${index + 1} hata verdi, bir sonrakine geçiliyor...`);
            tryFetch(index + 1);
        }
    }

    tryFetch();
    setInterval(() => tryFetch(0), 45000);
</script>

</body>
</html>
