<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Dijital - Mobil Uyumlu İhale Paneli</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; padding: 10px; margin: 0; }
        
        /* ANA TAŞIYICI: Mobilde alt alta, PC'de yan yana */
        .main-wrapper { 
            display: flex; 
            flex-direction: column; /* Mobilde alt alta başla */
            gap: 15px; 
            width: 100%; 
            max-width: 950px; 
        }

        /* PC Ekranları için (768px'den genişse) yan yana diz */
        @media (min-width: 768px) {
            .main-wrapper { flex-direction: row; padding: 20px; }
            body { padding: 20px; }
        }

        .card, .strategy-panel { border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); padding: 20px; }
        
        .card { background: white; flex: 2; }
        .strategy-panel { background: #1c2833; color: white; flex: 1; border-left: 4px solid #f1c40f; }

        h2 { color: #27ae60; text-align: center; margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .strategy-panel h3 { color: #f1c40f; font-size: 1rem; text-align: center; margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px; }

        /* Mobilde inputların taşmaması için grid yapısı */
        .row { display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 0.8fr; gap: 5px; margin-bottom: 10px; align-items: center; }
        
        /* Mobilde yazıların küçülmemesi için input fontlarını koru */
        .row input { width: 100%; padding: 8px 4px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; text-align: center; }
        .header-text { font-size: 9px; color: #7f8c8d; text-align: center; font-weight: bold; text-transform: uppercase; }

        .strat-row { margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 2px solid #2ecc71; }
        .strat-label { font-size: 9px; color: #bdc3c7; display: block; margin-bottom: 2px; }
        .strat-name { font-size: 11px; color: #f1c40f; font-weight: bold; display: block; }
        .strat-value { font-size: 16px; font-weight: bold; color: #2ecc71; display: block; }

        .summary-box { background: #f9f9f9; padding: 12px; border-radius: 10px; margin-top: 15px; }
        .res-line { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
        
        .net-kar-box { margin-top: 15px; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; }
        .win { background: #eafaf1; color: #27ae60; border: 1px solid #2ecc71; }
        .loss { background: #fdf2f2; color: #e74c3c; border: 1px solid #e74c3c; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- SOL PANEL -->
    <div class="card">
        <h2>🏛️ İhale Hesaplayıcı</h2>
        <div class="row">
            <div class="header-text">Kaynak</div>
            <div class="header-text">Adet</div>
            <div class="header-text">Teklif</div>
            <div class="header-text">Maliyet</div>
        </div>

        <div class="row">
            <input type="text" id="n1" value="Petrol Q3" oninput="hesapla()">
            <input type="number" id="a1" value="6626" oninput="hesapla()">
            <input type="number" id="t1" value="35.25" oninput="hesapla()">
            <input type="number" id="m1" placeholder="Maliyet" oninput="hesapla()">
        </div>

        <div class="row">
            <input type="text" id="n2" value="Demir Q0" oninput="hesapla()">
            <input type="number" id="a2" value="79506" oninput="hesapla()">
            <input type="number" id="t2" value="7.60" oninput="hesapla()">
            <input type="number" id="m2" placeholder="Maliyet" oninput="hesapla()">
        </div>

        <div class="row">
            <input type="text" id="n3" value="Metan Q0" oninput="hesapla()">
            <input type="number" id="a3" value="13251" oninput="hesapla()">
            <input type="number" id="t3" value="24.25" oninput="hesapla()">
            <input type="number" id="m3" placeholder="Maliyet" oninput="hesapla()">
        </div>

        <div style="margin-top: 10px;">
            <label style="font-size: 11px; font-weight: bold;">Teminat Bedeli ($):</label>
            <input type="number" id="depozito" value="114258" oninput="hesapla()" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
        </div>

        <div class="summary-box">
            <div class="res-line"><span>Toplam Ödül:</span> <b id="topOdul">$0</b></div>
            <div class="res-line"><span>Toplam Maliyet:</span> <b id="topMaliyet">$0</b></div>
            <div class="res-line" style="color: #2980b9;"><span>Nakit İhtiyacı:</span> <b id="nakit">$0</b></div>
        </div>

        <div id="sonucKutusu" class="net-kar-box win">
            <div id="netKar" style="font-size: 20px;">$0.00</div>
        </div>
    </div>

    <!-- SAĞ PANEL -->
    <div class="strategy-panel">
        <h3>📊 BORSA STRATEJİSİ</h3>
        <p style="font-size: 10px; color: #bdc3c7; text-align: center; margin-bottom: 15px;">(%3 Hedef Alım Fiyatı)</p>

        <div class="strat-row"><span class="strat-label">HEDEF</span><span class="strat-name" id="label1">PETROL Q3</span><span class="strat-value" id="s1">$0.00</span></div>
        <div class="strat-row"><span class="strat-label">HEDEF</span><span class="strat-name" id="label2">DEMİR Q0</span><span class="strat-value" id="s2">$0.00</span></div>
        <div class="strat-row"><span class="strat-label">HEDEF</span><span class="strat-name" id="label3">METAN Q0</span><span class="strat-value" id="s3">$0.00</span></div>
    </div>
</div>

<script>
    function hesapla() {
        const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
        const getName = (id) => document.getElementById(id).value || "Kaynak";

        for(let i=1; i<=3; i++) {
            const name = getName('n' + i);
            const price = getVal('t' + i);
            document.getElementById('label' + i).innerText = name.toUpperCase();
            document.getElementById('s' + i).innerText = "$" + (price * 0.97).toFixed(4);
        }

        const a1 = getVal('a1'), t1 = getVal('t1'), m1 = getVal('m1');
        const a2 = getVal('a2'), t2 = getVal('t2'), m2 = getVal('m2');
        const a3 = getVal('a3'), t3 = getVal('t3'), m3 = getVal('m3');
        const depozito = getVal('depozito');

        const toplamOdul = (a1 * t1) + (a2 * t2) + (a3 * t3);
        const toplamMaliyet = (a1 * m1) + (a2 * m2) + (a3 * m3);
        const kar = toplamOdul - toplamMaliyet;
        const nakitIhtiyac = toplamMaliyet + depozito;

        document.getElementById('topOdul').innerText = "$" + toplamOdul.toLocaleString();
        document.getElementById('topMaliyet').innerText = "$" + toplamMaliyet.toLocaleString();
        document.getElementById('nakit').innerText = "$" + nakitIhtiyac.toLocaleString();
        document.getElementById('netKar').innerText = "$" + kar.toLocaleString(undefined, {minimumFractionDigits: 2});

        const kutu = document.getElementById('sonucKutusu');
        kutu.className = kar >= 0 ? "net-kar-box win" : "net-kar-box loss";
    }
    hesapla();
</script>

</body>
</html>
