<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Fiyat Takip</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            background-color: #ffffff;
        }
        #price { 
            font-size: 200px; 
            font-weight: bold; 
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div id="price">...</div>

    <script>
        async function updatePrice() {
            try {
                // TIKIR TIKIR ÇALIŞAN YENİ LİNKİN:
                const url = 'https://script.google.com/macros/s/AKfycby5ggcmOiX-UuDFJb2daypbsc6QVRWeFd0QBtpOjMVEwADZCokFcZjIOxX35ddOUORM/exec';
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.price !== undefined && data.price !== null) {
                    document.getElementById('price').innerText = "$" + data.price;
                } else {
                    document.getElementById('price').innerText = "YOK";
                }
            } catch (e) {
                document.getElementById('price').innerText = "HATA";
                console.error("Bağlantı sorunu:", e);
            }
        }

        // Sayfa açıldığında çalıştır
        updatePrice();
        
        // 30 saniyede bir fiyatı tazele
        setInterval(updatePrice, 30000);
    </script>
</body>
</html>
