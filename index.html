<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Simco Tahmin Terminali v8.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
        .terminal { border: 2px solid var(--neon); padding: 30px; background: #111; box-shadow: 0 0 20px rgba(0,255,65,0.2); border-radius: 10px; width: 420px; text-align: center; }
        .price-label { font-size: 1.1em; color: #aaa; margin-bottom: 5px; }
        .price-value { font-size: 4.5em; font-weight: bold; color: white; text-shadow: 0 0 15px var(--neon); }
        .prediction { margin-top: 20px; font-size: 1.5em; color: #ffcc00; font-weight: bold; border-top: 1px solid #333; padding-top: 15px; }
        .status { margin-top: 15px; font-size: 0.75em; color: #666; }
        .footer { margin-top: 25px; font-size: 0.9em; color: #008f11; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="price-label">🤖 ROBOT Q0 CANLI BORSA</div>
    <div id="robot-price" class="price-value">...</div>
    
    <div id="prediction" class="prediction">ANALİZ YAPILIYOR</div>
    
    <div class="status">
        <span id="dot" class="blink">●</span> 
        <span id="log">Sistem başlatılıyor...</span>
    </div>

    <div class="footer">SAB TARAFINDAN GELİŞTİRİLİR</div>
</div>

<script>
    const TARGET = 'https://api.simcotools.com/v1/realms/0/market/prices';
    const PROXIES = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET)}`,
        `https://corsproxy.io/?${encodeURIComponent(TARGET)}`,
        `https://thingproxy.freeboard.io/fetch/${TARGET}`
    ];

    async function updateStats(idx = 0) {
        const log = document.getElementById('log');
        const priceEl = document.getElementById('robot-price');
        const predEl = document.getElementById('prediction');

        if (idx >= PROXIES.length) {
            log.innerText = "YOĞUNLUK VAR, 30sn BEKLE...";
            return;
        }

        try {
            log.innerText = `Kanal ${idx + 1} üzerinden bağlanılıyor...`;
            const res = await fetch(PROXIES[idx]);
            const json = await res.json();
            const data = json.contents ? JSON.parse(json.contents) : json;
            
            const robot = data.find(item => item.id === 102);

            if (robot) {
                const p = robot.price;
                priceEl.innerText = "$" + p.toFixed(2);
                log.innerText = "VERİ ALINDI | " + new Date().toLocaleTimeString();
                
                // İHALE TAHMİN MANTIĞI
                if (p < 613) {
                    predEl.innerHTML = "🚨 <span style='color:red'>İHALE GELİYOR!</span>";
                    predEl.classList.add('blink');
                } else if (p < 626) {
                    predEl.innerText = "⚠️ TAHMİN: HAZIRLIKLI OL";
                    predEl.classList.remove('blink');
                } else {
                    predEl.innerText = "✅ DURUM: SAKİN";
                    predEl.classList.remove('blink');
                }
            }
        } catch (e) {
            updateStats(idx + 1); // Başarısız olursa sonraki kanalı dene
        }
    }

    updateStats();
    setInterval(updateStats, 45000);
</script>

</body>
</html>
