<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Terminal V14 - Full</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Üst Bar */
        .top-bar { background: #111; padding: 10px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-family: 'Share Tech Mono'; z-index: 100; }
        .system-date { color: var(--neon-blue); font-weight: bold; }

        /* Ana İçerik */
        .content-wrapper { display: flex; flex: 1; overflow: hidden; }

        /* Sol Menü (Full Liste) */
        .sidebar { width: 400px; background: #0a0a0a; border-right: 1px solid #333; overflow-y: auto; padding: 20px; }
        .project-item { 
            padding: 10px 15px; margin-bottom: 5px; cursor: pointer; border-left: 3px solid #222; 
            transition: 0.2s; font-size: 0.85em; color: #888; background: #111; display: flex; justify-content: space-between; align-items: center;
        }
        .project-item:hover { background: #1a1a1a; color: #fff; border-left-color: var(--neon-blue); }
        .project-item.active { background: #1a1a1a; color: var(--neon-blue); border-left-color: var(--neon-pink); }
        .days-ago { font-family: 'Share Tech Mono'; font-size: 0.85em; padding: 2px 6px; border-radius: 3px; }
        .days-red { color: #ff4444; background: rgba(255,68,68,0.1); }
        .days-green { color: #00ff88; background: rgba(0,255,136,0.1); }

        /* Sağ Detay Panel */
        .main-panel { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f0f0f, #050505); }
        .pool-header { margin-bottom: 30px; border-bottom: 2px solid var(--neon-pink); padding-bottom: 15px; }
        .pool-title { font-size: 2.2em; color: var(--neon-pink); text-transform: uppercase; margin: 0; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .product-card { background: #151515; border: 1px solid #222; padding: 15px; border-radius: 4px; border-top: 2px solid var(--neon-blue); }

        /* Hızlı Kayan Yazı */
        .ticker-wrapper { background: #000; height: 35px; border-top: 1px solid var(--neon-blue); overflow: hidden; position: relative; }
        .ticker-content { 
            display: inline-block; white-space: nowrap; padding-left: 100%; 
            animation: ticker-fast 30s linear infinite; 
        }
        .ticker-item { display: inline-block; color: #fff; font-family: 'Share Tech Mono'; font-size: 0.85em; margin-right: 60px; }
        .ticker-label { color: var(--neon-blue); margin-right: 8px; font-weight: bold; }

        @keyframes ticker-fast {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="letter-spacing: 2px;">SAB STRATEGY TERMINAL <span style="color:#444">v14.0_FULL_DATA</span></div>
    <div class="system-date">SİSTEM TARİHİ: 13 MART 2026</div>
</div>

<div class="content-wrapper">
    <div class="sidebar" id="project-list">
        <h3 style="color:var(--neon-blue); font-size:0.75em; letter-spacing:2px; margin-bottom:15px; text-transform:uppercase; border-bottom:1px solid #222; padding-bottom:5px;">İhale Senaryo Veri Tabanı</h3>
        <div id="items-container"></div>
    </div>

    <div class="main-panel" id="detail-panel">
        <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#222; text-align:center;">
            <div style="font-size:4em; letter-spacing:15px; margin-bottom:10px;">SAB</div>
            <div style="font-size:1em; letter-spacing:3px;">ANALİZ ETMEK İÇİN BİR PAKET SEÇİN</div>
        </div>
    </div>
</div>

<div class="ticker-wrapper">
    <div class="ticker-content" id="ticker-data"></div>
</div>

<script>
    const today = new Date("2026-03-13");

    // FULL DATA SET (Eksiksiz)
    const scenarios = {
        "Navigasyon Takımyıldızı": { items: ["Roket Yakıtı Q3", "Uydu Q3"], last: "2026-03-11" },
        "Evsizleri besleyin": { items: ["Bal kabağı çorbası Q2", "Dondurulmuş pizza Q2"], last: "2026-03-11" },
        "Güvenlik Ekipmanı": { items: ["Deri Q1", "Eldiven Q1"], last: "2026-03-11" },
        "Akıllı Yollar": { items: ["Monitör Q0", "Malzeme araştırması Q0", "Akıllı Telefonlar Q0", "Elektronik bileşenler Q2"], last: "2026-03-04" },
        "Ezilme Testleri": { items: ["Oto karoseri Q2", "Temel iç kısım Q2", "Ekonomik araba Q1"], last: "2026-03-04" },
        "İleri Robotik": { items: ["Elektronik bileşenler Q0", "Robotlar Q0", "Yüksek seviye e-bilgisayar Q2"], last: "2026-03-04" },
        "Okul Öğle Yemeği Malzemeleri": { items: ["Kakao Q3", "Hamur Q3", "Şeker Q3"], last: "2026-02-25" },
        "Metal İşleme": { items: ["Alüminyum Q1", "Demir cevheri Q2", "Çelik Q3"], last: "2026-02-25" },
        "Orman Restorasyonu": { items: ["Tohum Q1", "Bitki araştırma Q0"], last: "2026-02-18" },
        "E-öğrenme Cihazları": { items: ["Tabletler Q3", "Dizüstü Q0", "Ekranlar Q3"], last: "2026-02-18" },
        "Çevreci Binalar": { items: ["Çelik Kiriş Q2", "Pencere Q1"], last: "2026-02-18" },
        "Zirve ikramları": { items: ["Samosa Q0", "Salata Q2", "Ekmek Q0"], last: "2026-02-11" },
        "Protein Reserves": { items: ["Yumurta Q2", "Biftek Q0"], last: "2026-02-11" },
        "Drone flosu": { items: ["Quadcopter Q1", "Uçuş bilgisayarı Q2", "Pil Q2"], last: "2026-02-11" },
        "Meat Supply": { items: ["Sosis Q3", "Biftek Q1"], last: "2026-02-04" },
        "Şehir Festivali": { items: ["El Çantası Q3", "Cadı kostümü Q2", "Topuklu Ayakkabı Q2"], last: "2026-02-04" },
        "Yıldız Gemisi Geliştirme": { items: ["Yıldız gemisi Q3", "Roket Yakıtı Q3"], last: "2026-01-28" },
        "İtici Roket Testi": { items: ["İtici tankı Q3", "Katı yakıt güçlendirici Q2"], last: "2026-01-28" },
        "Nükleer Santral": { items: ["Çelik Q2", "Betonarme Blok Q1", "Kimyasal Q1"], last: "2026-01-21" },
        "Sürdürülebilir Tarım": { items: ["Su Q3", "Tahıl Q0"], last: "2026-01-21" },
        "İlk Müdahale": { items: ["Kereste Q2", "İnşaat Gereci Q0", "Buldozer Q2", "Alet Takımı Q1"], last: "2026-01-21" },
        "Çevreci Otobüsler": { items: ["Elektrik motoru Q1", "Pil Q3", "Çelik Q0"], last: "2026-01-14" },
        "Uzay Keşfi": { items: ["Karbon fiber Q0", "BFR Q1", "Yörüngesel güçlendirici Q3"], last: "2026-01-07" },
        "Veri Merkezi": { items: ["Yerleşik bilgisayar Q0", "İşlemci Q2"], last: "2025-12-31" },
        "Değerli Metaller": { items: ["Külçe Altın Q1", "Altın cevheri Q3"], last: "2025-12-10" },
        "Hava Kalitesi İzleme": { items: ["Kimyasal Q3", "Akıllı Telefonlar Q1", "Ekranlar Q0"], last: "2025-12-10" },
        "Mars Gezgini": { items: ["Pil Q3", "Havacılık araştırması Q0", "Robotlar Q3"], last: "2025-11-19" },
        "Yakıt Rezervleri": { items: ["Metan Q2", "Etanol Q3", "Petrol Q0"], last: "2025-11-12" },
        "Tahliye Araçları": { items: ["Taşıma Q0", "Kamyon Q0", "Dizel Q3"], last: "2025-11-05" },
        "Sanat Müzesi": { items: ["İnşaat Gereci Q0", "Çelik Kiriş Q0", "Cam Q3"], last: "2025-10-22" },
        "Okul Öğle Yemeği Programı": { items: ["Portakal Q0", "Süt Q3", "Elmalar Q2"], last: "2025-10-01" },
        "Moda Festivali": { items: ["Kumaş Q2", "Moda araştırması Q0"], last: "2025-10-01" }
    };

    function calculateDays(dateStr) {
        const diff = today - new Date(dateStr);
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function init() {
        const container = document.getElementById('items-container');
        const ticker = document.getElementById('ticker-data');
        const sortedNames = Object.keys(scenarios).sort();

        sortedNames.forEach(name => {
            const days = calculateDays(scenarios[name].last);
            const div = document.createElement('div');
            div.className = 'project-item';
            const dayClass = days > 30 ? 'days-red' : 'days-green';
            div.innerHTML = `<span>${name}</span><span class="days-ago ${dayClass}">${days} GÜN</span>`;
            div.onclick = () => showDetail(name, div, days);
            container.appendChild(div);
        });

        // Ticker: Son 5 (Hızla gelenler)
        const recent = Object.keys(scenarios).sort((a,b) => new Date(scenarios[b].last) - new Date(scenarios[a].last)).slice(0, 5);
        recent.forEach(name => {
            ticker.innerHTML += `<div class="ticker-item"><span class="ticker-label">LATEST:</span>${name.toUpperCase()} (${calculateDays(scenarios[name].last)}d ago)</div>`;
        });
    }

    function showDetail(name, element, days) {
        document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        const data = scenarios[name];
        let itemsHtml = data.items.map(item => `
            <div class="product-card">
                <span style="color:#fff; display:block; margin-bottom:5px;">${item.split(' Q')[0]}</span>
                <span style="color:var(--neon-blue); font-family:'Share Tech Mono'; font-size:0.8em;">TARGET: Q${item.split(' Q')[1]}</span>
            </div>
        `).join('');

        document.getElementById('detail-panel').innerHTML = `
            <div class="pool-header"><h1 class="pool-title">${name}</h1>
            <div style="color:#888; font-family:'Share Tech Mono'; margin-top:5px;">COOLDOWN: <span style="color:var(--neon-pink)">${days} DAYS SINCE LAST DROP</span></div></div>
            <div class="product-grid">${itemsHtml}</div>
        `;
    }
    init();
</script>
</body>
</html>
