<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB İhale İstatistik Merkezi</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Arka plan animasyonu */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0d0d0d 25%, #1a1a1a 25%, #1a1a1a 50%, #0d0d0d 50%, #0d0d0d 75%, #1a1a1a 75%, #1a1a1a 100%);
            background-size: 56.57px 56.57px;
            z-index: -1;
            opacity: 0.2;
            animation: move-bg 3s linear infinite;
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 56.57px 0; }
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc, inset 0 0 10px #00ffcc;
        }

        h1 {
            text-shadow: 2px 2px 10px #ff00ff;
            color: #ff00ff;
            font-size: 3em;
            margin-bottom: 10px;
        }

        .gif-container {
            margin: 20px 0;
        }

        .gif-container img {
            width: 150px;
            border-radius: 10px;
            filter: drop-shadow(0 0 5px #00ffcc);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #ff00ff;
            color: white;
            padding: 15px;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #333;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        tr:hover {
            background: rgba(255, 0, 255, 0.1);
            transform: scale(1.02);
            color: #fff;
        }

        .progress-bar {
            background: #333;
            border-radius: 10px;
            height: 15px;
            width: 100%;
            margin-top: 5px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #00ffcc, #ff00ff);
            box-shadow: 0 0 10px #00ffcc;
        }

        .footer {
            margin-top: 30px;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueW9qZnd0ZWR4ZzR6Z3Z4Z3Z4Z3Z4Z3Z4Z3Z4Z3Z4Z3Z4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxVfUu7TzDW/giphy.gif" alt="Robot">
            <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueW9qZnd0ZWR4ZzR6Z3Z4Z3Z4Z3Z4Z3Z4Z3Z4Z3Z4Z3Z4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/LpLd2NGvpaiys/giphy.gif" alt="Data">
        </div>

        <h1>İHALE TRAFİK ANALİZİ</h1>
        <p>Hükümet Emirleri Veri Görselleştirme Paneli</p>

        <table>
            <thead>
                <tr>
                    <th>Ürün Adı</th>
                    <th>Trafik Payı (%)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>

        <div class="footer">
            * Bu veriler Sim Companies Hükümet Emirleri geçmişinden analiz edilmiştir.
        </div>
    </div>

    <script>
        const data = [
            {ad: "Robotlar", yuzde: 11.8},
            {ad: "Elektronik Bileşenler", yuzde: 8.5},
            {ad: "Çelik", yuzde: 7.2},
            {ad: "Pil", yuzde: 6.4},
            {ad: "Roket Yakıtı", yuzde: 5.9},
            {ad: "Süt", yuzde: 5.1},
            {ad: "Yazılım", yuzde: 4.7},
            {ad: "İşlemci", yuzde: 4.3},
            {ad: "İnşaat Gereci", yuzde: 4.1},
            {ad: "Ekranlar", yuzde: 3.8},
            {ad: "Tabletler", yuzde: 3.5},
            {ad: "Yıldız Gemisi", yuzde: 3.3},
            {ad: "Dizüstü", yuzde: 3.1},
            {ad: "Betonarme Blok", yuzde: 2.8},
            {ad: "Havacılık Araştırması", yuzde: 2.6},
            {ad: "Çelik Kiriş", yuzde: 2.4},
            {ad: "Kimyasal", yuzde: 2.2},
            {ad: "Pencere", yuzde: 1.9},
            {ad: "Demir Cevheri", yuzde: 1.7},
            {ad: "Cam", yuzde: 1.5},
            {ad: "Diğer (Biftek, Su, vb.)", yuzde: 14.1}
        ];

        const tbody = document.getElementById('table-body');

        data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.ad}</td>
                <td>
                    <strong>%${item.yuzde}</strong>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${item.yuzde * 5}%"></div>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    </script>
</body>
</html>
