<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Full Veri Terminali</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2f81f7; --bg: #0d1117; --sidebar-bg: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--sidebar-bg); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-family: 'Roboto Mono'; font-size: 0.85em; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 460px; background: var(--sidebar-bg); border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; }
        .list-header { display: grid; grid-template-columns: 1fr 60px 100px; font-size: 0.7em; color: #8b949e; padding: 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .item { padding: 10px; margin-bottom: 2px; cursor: pointer; border-radius: 4px; display: grid; grid-template-columns: 1fr 60px 100px; align-items: center; font-size: 0.82em; transition: 0.1s; }
        .item:hover { background: #21262d; }
        .item.active { background: #1f6feb; color: white; }
        .freq { font-family: 'Roboto Mono'; font-weight: bold; text-align: center; color: #58a6ff; }
        .item.active .freq { color: white; }
        .days { font-family: 'Roboto Mono'; text-align: right; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: #161b22; border: 1px solid var(--border); padding: 15px; border-radius: 6px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
        .ticker { background: #010409; height: 30px; border-top: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; }
        .ticker-inner { display: inline-block; padding-left: 100%; animation: scroll 40s linear infinite; white-space: nowrap; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="header">
    <div>SAB STRATEGY V18 // FULL DATABASE</div>
    <div>SİSTEM TARİHİ: 13 MART 2026</div>
</div>

<div class="container">
    <div class="sidebar">
        <div class="list-header"><span>Paket Adı</span><span>Frekans</span><span>Gecikme</span></div>
        <div id="target"></div>
    </div>
    <div class="main" id="view">
        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#484f58;">ANALİZ İÇİN LİSTEDEN SEÇİM YAPIN</div>
    </div>
</div>

<div class="ticker"><div class="ticker-inner" id="tick"></div></div>

        "Navigasyon Takımyıldızı": { c: 5, d: "2026-03-11", i: ["Roket Yakıtı Q3", "Uydu Q3"] },
        "Evsizleri besleyin": { c: 5, d: "2026-03-11", i: ["Bal kabağı çorbası Q2", "Dondurulmuş pizza Q2"] },
        "Çevreci Binalar": { c: 5, d: "2026-02-18", i: ["Çelik Kiriş Q2", "Pencere Q1"] },
        "Protein Reserves": { c: 5, d: "2026-02-11", i: ["Yumurta Q2", "Biftek Q0"] },

        "Nükleer Santral": { c: 4, d: "2026-01-21", i: ["Çelik Q2", "Betonarme Blok Q1", "Kimyasal Q1"] },
        "Moda Festivali": { c: 4, d: "2025-10-01", i: ["Kumaş Q2", "Moda araştırması Q0"] },
        "Metal İşleme": { c: 3, d: "2026-02-25", i: ["Alüminyum Q1", "Demir cevheri Q2", "Çelik Q3"] },

        "Ekonomik Destek": { c: 2, d: "2025-11-12", i: ["Yazılım Q0", "Tabletler Q2"] },
        "Şehir Dekorasyonları": { c: 2, d: "2026-02-04", i: ["Bal kabağı feneri Q1", "Bal kabağı Q2"] },
        "BM Zirvesi İkramları": { c: 2, d: "2025-09-24", i: ["Ekmek Q1", "Kahve çekirdeği Q2", "Çikolata Q3"] },
        "Metro Altyapısı": { c: 2, d: "2025-11-26", i: ["Betonarme Blok Q2", "İnşaat Gereci Q0", "Çelik Kiriş Q0"] }
    };

    const target = document.getElementById('target');
    const tick = document.getElementById('tick');

    // En çok gelenden sırala
    Object.keys(data).sort((a,b) => data[b].c - data[a].c).forEach(name => {
        const days = Math.floor((now - new Date(data[name].d)) / 86400000);
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `<span>${name}</span><span class="freq">${data[name].c}x</span><span class="days">${days} GÜN</span>`;
        el.onclick = () => {
            document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            show(name, days);
        };
        target.appendChild(el);
        tick.innerHTML += `<span style="margin-right:40px;">${name.toUpperCase()}: ${days} GÜN ÖNCE</span>`;
    });

    function show(name, days) {
        const info = data[name];
        document.getElementById('view').innerHTML = `
            <h1 style="margin:0; font-size:1.6em; color:#fff;">${name}</h1>
            <p style="color:#8b949e; font-size:0.9em; margin-bottom:20px;">
                Bu paket toplam <b>${info.c}</b> kez ihale edildi. En son <b>${days}</b> gün önce görüldü.
            </p>
            <div class="grid">${info.i.map(p => `
                <div class="card">
                    <span style="display:block; color:#58a6ff; font-weight:bold; font-size:0.9em; margin-bottom:5px;">${p.split(' Q')[0]}</span>
                    <span style="font-family:'Roboto Mono'; font-size:0.75em; color:#8b949e;">Hedef Kalite: Q${p.split(' Q')[1]}</span>
                </div>
            `).join('')}</div>
        `;
    }
</script>
</body>
</html>
