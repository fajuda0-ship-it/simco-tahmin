<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SAB Fiyat Takip</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            background-color: #ffffff;
        }
        #price { 
            font-size: 200px; 
            font-weight: bold; 
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div id="price">YÜKLENİYOR...</div>

    <script>
        async function updatePrice() {
            try {
                // En son verdiğin kusursuz çalışan link
                const url = 'https://script.google.com/macros/s/AKfycbwnFcuhbnsGRvpXD511OMHEl2-vG6WptFLUHLADOUFblOxJiwrpRzIvNAJ7ZePvCzrR/exec';
                
                // Google yönlendirmelerini (redirect) kabul etmesi için mode: 'cors' ve redirect: 'follow' ekledik
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    redirect: 'follow'
                });
                
                const data = await response.json();
                
                if (data && data.price !== undefined && data.price !== null) {
                    document.getElementById('price').innerText = "$" + data.price;
                } else {
                    document.getElementById('price').innerText = "YOK";
                }
            } catch (e) {
                document.getElementById('price').innerText = "HATA";
                console.error("Detaylı Hata:", e);
            }
        }

        updatePrice();
        setInterval(updatePrice, 30000);
    </script>
</body>
</html>
