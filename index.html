.sab-logo {
    position: fixed;
    top: 15px;
    right: 20px;
    width: 100px; /* Boyutu buradan ayarlayabilirsin */
    height: auto;
    z-index: 2000; /* En üstte görünmesi için */
    border: 1px solid var(--neon);
    border-radius: 5px;
    box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
    pointer-events: none; /* Mouse ile tıklamayı engellemez, altındaki butonlara basabilirsin */
}

/* Küçük ekranlarda başlığa çarpmasın diye */
@media (max-width: 600px) {
    .sab-logo {
        width: 60px;
        top: 10px;
    }
}
        
        :root { --neon: #00ff41; --bg: #050505; --warn: #ffab00; --crit: #ff3131; --panel-bg: rgba(0, 255, 65, 0.05); }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; font-size: 13px; margin: 0; overflow: hidden; }
        
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; height: calc(100vh - 180px); }
        .panel { border: 1px solid var(--neon); padding: 15px; background: var(--panel-bg); overflow-y: auto; display: flex; flex-direction: column; }
        h2 { font-size: 1rem; border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin-top: 0; letter-spacing: 2px; }
        
        /* Arama ve Mod Butonları */
        .search-container { margin-bottom: 15px; }
        .mode-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 12px; cursor: pointer; font-family: inherit; font-size: 11px; transition: 0.3s; margin-right: 5px; outline: none; }
        .mode-btn.active { background: var(--neon); color: var(--bg); font-weight: bold; box-shadow: 0 0 10px var(--neon); }
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; box-sizing: border-box; outline: none; margin-top: 10px; }

        /* Liste Öğeleri */
        .list-item { padding: 10px; cursor: pointer; border-bottom: 1px solid rgba(0,255,65,0.2); display: flex; justify-content: space-between; transition: 0.2s; }
        .list-item:hover { background: rgba(0,255,65,0.15); padding-left: 15px; }
        .list-item.active { background: var(--neon); color: var(--bg); font-weight: bold; }

        /* Detay Kartları */
        .card { border: 1px solid var(--neon); margin-bottom: 15px; padding: 15px; position: relative; background: rgba(0,0,0,0.3); }
        .tag { position: absolute; top: 10px; right: 10px; padding: 4px 8px; font-size: 0.75rem; font-weight: bold; }
        .tag-crit { background: var(--crit); color: white; animation: blink 1s infinite; }
        .tag-ok { border: 1px solid var(--neon); color: var(--neon); }
        .tag-warn { background: var(--warn); color: black; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* ALT KAYAR BANT (TICKER) */
        .ticker-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; background: #800000; color: white; padding: 10px 0; z-index: 1000; overflow: hidden; border-top: 2px solid var(--neon); box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .ticker { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 280s linear infinite; font-size: 15px; font-weight: bold; }
        .ticker-item { display: inline-block; padding: 0 100px; border-right: 1px solid rgba(255,255,255,0.3); }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .ticker-wrapper:hover .ticker { animation-play-state: paused; }
    </style>

// --- MANTIK ---
function getProducts() {
    const p = {};
    tenderData.forEach(t => t.items.forEach(i => {
        if(!p[i]) p[i] = { name: i, projects: [] };
        p[i].projects.push(t);
    }));
    return Object.values(p).sort((a,b) => a.name.localeCompare(b.name));
}

const allProducts = getProducts();

function setMode(mode) {
    currentMode = mode;
    document.getElementById('btnProd').classList.toggle('active', mode === 'product');
    document.getElementById('btnTend').classList.toggle('active', mode === 'tender');
    document.getElementById('mainSearch').placeholder = mode === 'product' ? "Ürün ismi yazın..." : "İhale ismi yazın...";
    document.getElementById('mainSearch').value = "";
    renderList("");
}

function renderList(filter) {
    const list = document.getElementById('dataList');
    list.innerHTML = "";
    const f = filter.toLowerCase();

    if(currentMode === 'product') {
        allProducts.forEach(prod => {
            if(prod.name.toLowerCase().includes(f)) {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${prod.name}</span> <small>(${prod.projects.length} İHALE)</small>`;
                div.onclick = () => showProductDetails(prod, div);
                list.appendChild(div);
            }
        });
    } else {
        tenderData.forEach(tend => {
            if(tend.name.toLowerCase().includes(f)) {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${tend.name}</span>`;
                div.onclick = () => showTenderDetails(tend, div);
                list.appendChild(div);
            }
        });
    }
}

function showProductDetails(prod, el) {
    updateUISelection(el);
    const view = document.getElementById('detailView');
    view.innerHTML = `<h3>ÜRÜN ANALİZİ: ${prod.name}</h3>`;
    prod.projects.forEach(p => {
        const last = new Date(p.lastSeen);
        const rem = p.cycle - Math.ceil((SYSTEM_DATE - last) / 86400000);
        view.innerHTML += `
            <div class="card">
                <span class="tag ${rem <= 0 ? 'tag-crit' : 'tag-ok'}">${rem <= 0 ? 'GECİKTİ' : rem + ' GÜN'}</span>
                <strong>${p.name}</strong><br>
                <small style="color:var(--warn)">İçerik: ${p.items.join(", ")}</small>
            </div>`;
    });
}

function showTenderDetails(tend, el) {
    updateUISelection(el);
    const view = document.getElementById('detailView');
    const last = new Date(tend.lastSeen);
    const passed = Math.ceil((SYSTEM_DATE - last) / 86400000);
    const rem = tend.cycle - passed;

    view.innerHTML = `
        <div class="card" style="border-width:2px;">
            <span class="tag ${rem <= 0 ? 'tag-crit' : 'tag-ok'}" style="font-size:1rem;">${rem <= 0 ? 'GECİKTİ (+'+Math.abs(rem)+')' : 'KALAN: '+rem+' G'}</span>
            <h2 style="color:var(--warn);">${tend.name}</h2>
            <hr border="0" style="border-top:1px solid var(--neon); opacity:0.3;">
            <p><strong>DÖNGÜ:</strong> ${tend.cycle} GÜN</p>
            <p><strong>SON GÖRÜLME:</strong> ${tend.lastSeen}</p>
            <p><strong>GEREKLİ MATERYALLER:</strong></p>
            <ul style="color:var(--neon); font-size:1.1rem;">
                ${tend.items.map(i => `<li>${i}</li>`).join('')}
            </ul>
        </div>
    `;
}

function updateUISelection(el) {
    document.querySelectorAll('.list-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('noSelection').style.display = 'none';
}

function updateTicker() {
    const content = document.getElementById('tickerContent');
    const criticals = tenderData.map(t => {
        const d = Math.ceil((SYSTEM_DATE - new Date(t.lastSeen)) / 86400000) - t.cycle;
        return { n: t.name, d: d };
    }).filter(x => x.d > 0).sort((a,b) => b.d - a.d).slice(0, 10);

    if(criticals.length > 0) {
        const html = criticals.map(i => `<span class="ticker-item">⚠️ [KRİTİK GECİKME] ${i.n} (+${i.d} GÜN)</span>`).join("");
        content.innerHTML = html + html; 
    } else {
        content.innerHTML = "<span class='ticker-item'>[SAB-INFO] TÜM SİSTEMLER NORMAL. GECİKMELİ PROJE YOK.</span>";
    }
}

document.getElementById('mainSearch').addEventListener('input', e => renderList(e.target.value));
renderList("");
updateTicker();
