<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimCo Üretim Planlayıcı</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-2xl w-full bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl p-6">
        <h1 class="text-xl font-black mb-6 text-center text-green-500 tracking-widest uppercase">SimCo Üretim Planlayıcı</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-zinc-500 block mb-1">Bina Seçimi</label>
                    <select id="bina-sec" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700 outline-none text-sm">
                        <option value="enerji">Enerji Santrali</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 block mb-1">Bina Lv</label>
                        <input type="number" id="bina-lv" value="1" min="1" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 block mb-1">Bonus %</label>
                        <input type="number" id="uretim-bonusu" value="0" step="0.1" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 block mb-1">Ham Admin %</label>
                        <input type="number" id="ham-admin" value="22.35" step="0.01" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 block mb-1">COO Becerisi</label>
                        <input type="number" id="coo-skill" value="30" class="w-full bg-zinc-800 p-3 rounded-lg border border-zinc-700 text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] uppercase font-bold text-zinc-500 block mb-1">Hedef Adet</label>
                    <input type="number" id="hedef-adet" value="5000" class="w-full bg-zinc-800 p-3 rounded-lg border border-green-900 focus:border-green-500 outline-none text-sm font-bold">
                </div>
            </div>

            <div class="bg-black/30 rounded-xl p-6 border border-zinc-800 flex flex-col justify-center text-center space-y-6">
                <div>
                    <p class="text-[10px] uppercase text-zinc-500 mb-1 tracking-widest">Birim Maliyet</p>
                    <h2 id="res-birim" class="text-4xl font-black text-white">$0.000</h2>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-zinc-800 pt-6">
                    <div class="text-left">
                        <p class="text-[10px] text-zinc-500 uppercase">Net Admin</p>
                        <p id="res-net-admin" class="font-bold text-blue-400 text-sm">%0.00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-zinc-500 uppercase">Süre</p>
                        <p id="res-sure" class="font-bold text-zinc-200 text-sm">0 dk</p>
                    </div>
                </div>

                <div class="pt-4">
                    <p class="text-[10px] text-zinc-500 uppercase mb-1 tracking-widest text-green-500">Toplam Kasa Çıkışı</p>
                    <p id="res-toplam" class="text-2xl font-black text-white">$0.00</p>
                </div>
            </div>
        </div>
        <p class="mt-8 text-[9px] text-center text-zinc-600 italic tracking-widest">Harsh Sachdev (COO) Algoritması Aktif</p>
    </div>

    <script>
    // Sabit Veriler (Senin Gönderdiklerin)
    const EnerjiVerisi = {
        saatlikTaban: 2382.03, // Seviye 1, %0 bonus
        iscilik: 0.1705 // Daha hassas işçilik değeri
    };

    function hesapla() {
        try {
            // Değerleri Al
            const lv = parseFloat(document.getElementById('bina-lv').value) || 0;
            const bonus = parseFloat(document.getElementById('uretim-bonusu').value) || 0;
            const hamAdmin = parseFloat(document.getElementById('ham-admin').value) || 0;
            const cooSkill = parseFloat(document.getElementById('coo-skill').value) || 0;
            const hedefAdet = parseFloat(document.getElementById('hedef-adet').value) || 0;

            // 1. Net Yönetim Gideri (Senin Harsh Etkisi: %22.35 -> %14.98)
            const indirimKatsayisi = 0.2456;
            const netAdmin = Math.max(0, hamAdmin - (cooSkill * indirimKatsayisi));
            
            // 2. Üretim Hızı (Seviye ve Bonus Etkisi)
            const saatlikUretim = (EnerjiVerisi.saatlikTaban * lv) * (1 + (bonus / 100));
            
            // 3. Süre Hesabı
            const toplamSaat = hedefAdet > 0 ? (hedefAdet / saatlikUretim) : 0;

            // 4. Maliyet Hesabı
            const birimYonetim = EnerjiVerisi.iscilik * (netAdmin / 100);
            const birimToplam = EnerjiVerisi.iscilik + birimYonetim;
            const toplamKasa = birimToplam * hedefAdet;

            // Ekrana Yazdır
            document.getElementById('res-birim').innerText = "$" + birimToplam.toFixed(3);
            document.getElementById('res-net-admin').innerText = "%" + netAdmin.toFixed(2);
            document.getElementById('res-toplam').innerText = "$" + toplamKasa.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            // Süre Formatla
            document.getElementById('res-sure').innerText = formatSure(toplamSaat);

        } catch (e) {
            console.error("Hesaplama Hatası:", e);
        }
    }

    function formatSure(saat) {
        if (saat <= 0) return "0 dk";
        const d = Math.floor(saat / 24);
        const h = Math.floor(saat % 24);
        const m = Math.round((saat % 1) * 60);
        let s = "";
        if (d > 0) s += d + "g ";
        if (h > 0) s += h + "s ";
        if (m > 0 || s === "") s += m + "dk";
        return s;
    }

    // Input Değiştiğinde Hesapla
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', hesapla);
    });

    // İlk Çalıştırma
    hesapla();
    </script>
</body>
</html>
