<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Tam İhale Veri Bankası</title>
    <style>
        :root { --neon-magenta: #ff00ff; --neon-cyan: #00ffcc; }
        body { background-color: #050505; color: white; font-family: 'Consolas', monospace; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #0a0a0a; border: 2px solid var(--neon-magenta); border-radius: 12px; padding: 30px; box-shadow: 0 0 25px rgba(255, 0, 255, 0.2); }
        
        .live-header { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; border-left: 5px solid var(--neon-cyan); }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; color: var(--neon-magenta); border-bottom: 2px solid #333; font-size: 0.8em; }
        td { padding: 10px; border-bottom: 1px solid #1a1a1a; font-size: 0.95em; }
        
        .time-ago { font-weight: bold; padding: 3px 6px; border-radius: 4px; }
        .recent { color: var(--neon-cyan); background: rgba(0, 255, 204, 0.1); }
        .old { color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .critical { color: #ff4444; background: rgba(255, 68, 68, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="live-header">
        <div><span style="color: #888; font-size: 0.7em;">BUGÜNÜN TARİHİ</span><br><b id="today-display" style="color: var(--neon-cyan);">09.03.2026</b></div>
        <div style="text-align: right;"><span style="color: #888; font-size: 0.7em;">DURUM</span><br><b>TÜM VERİLER AKTİF</b></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ÜRÜN ADI</th>
                <th>PAY (%)</th>
                <th>Q1+ (%)</th>
                <th>DURUM (GÜN ÖNCE)</th>
            </tr>
        </thead>
        <tbody id="full-table"></tbody>
    </table>
</div>

<script>
    const TODAY = new Date("2026-03-09");

    const fullData = [
        {ad: "Robotlar", p: 11.8, q: 28, last: "2026-03-04"},
        {ad: "E-Bileşenler", p: 8.5, q: 22, last: "2026-03-04"},
        {ad: "Çelik", p: 7.2, q: 15, last: "2025-11-05"},
        {ad: "Pil", p: 6.4, q: 19, last: "2025-11-05"},
        {ad: "Roket Yakıtı", p: 5.9, q: 10, last: "2025-03-19"},
        {ad: "Yazılım", p: 4.7, q: 35, last: "2025-11-12"},
        {ad: "İşlemci", p: 4.3, q: 31, last: "2025-12-31"},
        {ad: "İnşaat Gereci", p: 4.1, q: 12, last: "2026-01-22"},
        {ad: "Ekranlar", p: 3.8, q: 18, last: "2026-02-18"},
        {ad: "Tabletler", p: 3.5, q: 25, last: "2026-02-18"},
        {ad: "Yıldız Gemisi", p: 3.3, q: 40, last: "2025-03-19"},
        {ad: "Dizüstü", p: 3.1, q: 27, last: "2026-02-18"},
        {ad: "Malzeme Araş.", p: 1.8, q: 0, last: "2026-03-04"},
        {ad: "Akıllı Telefonlar", p: 1.6, q: 12, last: "2026-03-04"},
        {ad: "Biftek", p: 1.5, q: 15, last: "2026-02-04"},
        {ad: "Kamyon", p: 1.4, q: 10, last: "2025-11-13"},
        {ad: "Demir Cevheri", p: 1.2, q: 5, last: "2025-11-06"},
        {ad: "Bal Kabağı", p: 0.8, q: 20, last: "2026-01-29"}
    ];

    const tbody = document.getElementById('full-table');

    fullData.sort((a,b) => b.p - a.p).forEach(item => {
        const lastSeen = new Date(item.last);
        const days = Math.floor((TODAY - lastSeen) / (1000 * 60 * 60 * 24));
        
        let statusClass = "recent";
        if(days > 15) statusClass = "old";
        if(days > 60) statusClass = "critical";

        const row = document.createElement('tr');
        row.innerHTML = `
            <td><b>${item.ad}</b></td>
            <td style="color:var(--neon-cyan)">%${item.p}</td>
            <td>%${item.q}</td>
            <td><span class="time-ago ${statusClass}">${days} GÜN ÖNCE</span></td>
        `;
        tbody.appendChild(row);
    });
</script>
</body>
</html>
