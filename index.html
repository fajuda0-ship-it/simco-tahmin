<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Frekans Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff00ff; --neon-blue: #00d4ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: rgba(10, 10, 10, 0.98); border: 1px solid #333; padding: 20px; }
        
        .header-box { text-align: center; border-bottom: 2px solid var(--neon-pink); padding-bottom: 20px; margin-bottom: 20px; }
        h2 { color: var(--neon-pink); letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: #111; padding: 15px; border-top: 3px solid var(--neon-blue); text-align: center; }
        .stat-label { font-size: 0.7em; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .stat-num { display: block; font-family: 'Share Tech Mono'; font-size: 1.8em; color: var(--neon-blue); }

        .table-wrapper { overflow-x: auto; max-height: 700px; overflow-y: auto; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; font-size: 0.85em; }
        th { position: sticky; top: 0; background: #1a1a1a; color: var(--neon-pink); padding: 15px; text-align: left; border-bottom: 2px solid var(--neon-pink); z-index: 10; }
        td { padding: 12px 15px; border-bottom: 1px solid #222; }
        tr:nth-child(even) { background: #0a0a0a; }
        tr:hover { background: #1a1a1a; cursor: crosshair; }
        
        .q-tag { padding: 2px 8px; border-radius: 3px; font-weight: bold; }
        .high { color: #00ff88; text-shadow: 0 0 5px #00ff88; }
        .mid { color: #ffcc00; }
        .low { color: #ff4444; }
        .freq-count { color: var(--neon-blue); font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

        <h2>SAB FREKANS ANALİZİ (V10.0)</h2>

    </div>

    <div class="stats-bar">

        <div class="stat-item"><span class="stat-label">En Çok Gelen Sektör</span><span class="stat-num" style="color:var(--neon-pink)">ROBOTİK</span></div>
        <div class="stat-item"><span class="stat-label">Sıralama Modu</span><span class="stat-num">FREKANS (Z->A)</span></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>

                    <th>TOPLAM GELİŞ (FREKANS)</th>
                    <th>Q0+ OLASILIĞI</th>
                    <th>SON GÖRÜLME</th>

            </thead>
            <tbody id="data-table"></tbody>

    <div style="margin-top: 30px; text-align: center; color: #222; letter-spacing: 15px; font-weight: 900; font-size: 1.5em;">SAB STRATEGY SYSTEMS</div>

    const tableBody = document.getElementById('data-table');

    function renderTable() {
        // EN ÖNEMLİ KISIM: Geliş sayısına (c) göre büyükten küçüğe sırala
        const sorted = fullData.sort((a,b) => b.c - a.c);
        
        sorted.forEach(item => {
            const prob = ((item.qp / item.c) * 100).toFixed(1);
            let probClass = "mid";
            if (prob >= 80) probClass = "high";
            if (prob <= 30) probClass = "low";

            const row = `<tr>
                <td><b style="color:#fff">${item.ad}</b></td>
                <td><span class="freq-count">${item.c} Kez</span></td>
                <td><span class="q-tag ${probClass}">%${prob}</span></td>
                <td style="color:#666">${item.l}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    renderTable();
</script>

</html>
